      const midx=(x0+x1)/2+(Math.random()-0.5)*60, midy=(y0+y1)/2+(Math.random()-0.5)*30;
      ctx.strokeStyle = `hsla(${(hueBase+190)%360},90%,85%,${0.5+beatFlash*0.4})`;
      ctx.lineWidth = depth*0.7;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(midx,midy); ctx.lineTo(x1,y1); ctx.stroke();
      if(Math.random()<0.5) drawBolt(midx,midy, midx+(Math.random()-0.5)*100, midy+(Math.random()-0.5)*100, depth-1);
    }
  }

  // --- Chladni Sand: cymatics-style standing-wave nodal patterns from sound ---
  let chladniPts = null;
  function drawChladni(bass,mid,treble,overall){
    if(!chladniPts){
      chladniPts = [];
      for(let i=0;i<500;i++) chladniPts.push({ x:Math.random()*W, y:Math.random()*H });
    }
    const cx=W/2, cy=H/2;
    const m = 3+Math.floor(bass/40);
    const n = 2+Math.floor(mid/50);
    const A = Math.min(W,H)/2;
    for(const p of chladniPts){
      const nx=(p.x-cx)/A, ny=(p.y-cy)/A;
      const val = Math.cos(n*Math.PI*nx)*Math.cos(m*Math.PI*ny) - Math.cos(m*Math.PI*nx)*Math.cos(n*Math.PI*ny);
      const grad = val*8;
      p.x += (Math.random()-0.5)*1.4 - grad*0.6;
      p.y += (Math.random()-0.5)*1.4;
      if(p.x<0||p.x>W) p.x=Math.random()*W;
      if(p.y<0||p.y>H) p.y=Math.random()*H;
    }
    ctx.fillStyle = `hsla(${hueBase%360},20%,90%,0.6)`;
    for(const p of chladniPts){ ctx.fillRect(p.x,p.y,1.4,1.4); }
  }

  // --- Black Hole: swirling accretion disk spiraling into a dark event horizon ---
  let holeParticles = null;
  function drawBlackHole(bass,mid,treble,overall){
    if(!holeParticles){
      holeParticles = [];
      for(let i=0;i<200;i++) holeParticles.push({ ang:Math.random()*Math.PI*2, r:100+Math.random()*300, speed:0.01+Math.random()*0.02, hue:Math.random()*60 });
    }
    const cx=W/2, cy=H/2;
    for(const p of holeParticles){
      p.ang += p.speed*(1+bass*0.01);
      p.r -= 0.4+beatFlash*1.5;
      if(p.r<20){ p.r=100+Math.random()*300; p.ang=Math.random()*Math.PI*2; }
      const x=cx+Math.cos(p.ang)*p.r, y=cy+Math.sin(p.ang)*p.r*0.4;
      const hue=(hueBase+p.hue)%360;
      ctx.fillStyle = `hsla(${hue},85%,65%,${Math.min(1,(320-p.r)/320)})`;
      ctx.beginPath(); ctx.arc(x,y,1.6,0,Math.PI*2); ctx.fill();
    }
    const holeR = 30+beatFlash*8;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx,cy,holeR,0,Math.PI*2); ctx.fill();
    const grad = ctx.createRadialGradient(cx,cy,holeR,cx,cy,holeR*2.4);
    grad.addColorStop(0, `hsla(${hueBase%360},90%,60%,0.5)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,holeR*2.4,0,Math.PI*2); ctx.fill();
  }

  // --- Supernova: expanding shockwave rings blooming from a radiant core ---
  let novaWaves = [];
  function drawSupernova(bass,mid,treble,overall){
    if(beatFlash>0.85){ novaWaves.push({ r:5, hue:hueBase }); }
    const cx=W/2, cy=H/2;
    for(let i=novaWaves.length-1;i>=0;i--){
      const w = novaWaves[i];
      w.r += 6+overall*0.05;
      const alpha = Math.max(0, 1-w.r/(Math.max(W,H)*0.7));
      if(alpha<=0){ novaWaves.splice(i,1); continue; }
      ctx.strokeStyle = `hsla(${w.hue%360},90%,70%,${alpha})`;
      ctx.lineWidth = 3*alpha+1;
      ctx.beginPath(); ctx.arc(cx,cy,w.r,0,Math.PI*2); ctx.stroke();
    }
    const coreR = 20+bass*0.4+beatFlash*30;
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
    grad.addColorStop(0, `hsla(${hueBase%360},95%,80%,0.8)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,coreR,0,Math.PI*2); ctx.fill();
  }

  // --- DNA Helix: a rotating double helix drifting slowly across the screen ---
  function drawDnaHelix(bass,mid,treble,overall){
    const amp = Math.min(W,H)*0.18+bass*0.3;
    const t = performance.now()*0.0015;
    const steps = 40;
    for(let i=0;i<steps;i++){
      const frac = i/steps;
      const y = frac*H;
      const phase = frac*Math.PI*6 + t*3;
      const x1 = W/2 + Math.sin(phase)*amp;
      const x2 = W/2 + Math.sin(phase+Math.PI)*amp;
      if(i%3===0){
        ctx.strokeStyle = `hsla(${hueBase%360},60%,70%,0.25)`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke();
      }
      const hue1=(hueBase+frac*80)%360, hue2=(hueBase+180+frac*80)%360;
      ctx.fillStyle = `hsla(${hue1},85%,65%,0.9)`;
      ctx.beginPath(); ctx.arc(x1,y,3+beatFlash*2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = `hsla(${hue2},85%,65%,0.9)`;
      ctx.beginPath(); ctx.arc(x2,y,3+beatFlash*2,0,Math.PI*2); ctx.fill();
    }
  }

  // --- Desert Dunes: warm layered sunset dunes with a glowing sun ---
  let duneT = 0;
  function drawDunes(bass,mid,treble,overall){
    duneT += 0.003+overall*0.0001;
    const bands = 6;
    for(let b=0;b<bands;b++){
      ctx.beginPath();
      const baseY = H*0.35 + b*(H*0.62/bands);
      ctx.moveTo(0,baseY);
      for(let x=0;x<=W;x+=16){
        const t=x/W;
        const y = baseY + Math.sin(t*Math.PI*2.5+duneT*2+b)*18*(1+bass*0.01);
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      const hue = ((28+b*6+hueBase*0.15)%60)+15;
      ctx.fillStyle = `hsla(${hue},70%,${55-b*5}%,0.5)`;
      ctx.fill();
    }
    const sunY=H*0.28, sunR=50+bass*0.3;
    const grad = ctx.createRadialGradient(W/2,sunY,0,W/2,sunY,sunR);
    grad.addColorStop(0,'hsla(40,95%,75%,0.8)');
    grad.addColorStop(1,'hsla(20,90%,55%,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(W/2,sunY,sunR,0,Math.PI*2); ctx.fill();
  }

  // --- Prism Rays: rainbow light fanning out and refracting through a prism ---
  function drawPrism(bass,mid,treble,overall){
    const cx=W*0.5, cy=H*0.5;
    const rays = 60;
    for(let i=0;i<rays;i++){
      const t = i/rays;
      const ang = (t-0.5)*Math.PI*0.5 + Math.sin(rotation)*0.1;
      const len = Math.hypot(W,H)*0.7;
      const hue = (t*300+hueBase)%360;
      const grad = ctx.createLinearGradient(cx,cy,cx+Math.cos(ang)*len,cy+Math.sin(ang)*len);
      grad.addColorStop(0, `hsla(${hue},90%,65%,0.35)`);
      grad.addColorStop(1, `hsla(${hue},90%,65%,0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2+beatFlash*2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*len,cy+Math.sin(ang)*len); ctx.stroke();
    }
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotation*0.5);
    ctx.beginPath(); ctx.moveTo(-20,-20); ctx.lineTo(20,-20); ctx.lineTo(0,20); ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
    ctx.restore();
  }

  // --- Lotus Bloom: a slow-breathing layered flower, opening and closing with the music ---
  function drawLotus(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const bloom = 0.5+0.5*Math.sin(performance.now()*0.0006)+bass*0.002+beatFlash*0.3;
    for(let l=0;l<3;l++){
      const petals=8;
      const len = (Math.min(W,H)*0.16)*(l+1)*(0.5+bloom*0.5);
      for(let i=0;i<petals;i++){
        const ang = (Math.PI*2/petals)*i + l*(Math.PI/petals) + rotation*0.1;
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(ang);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.quadraticCurveTo(len*0.25,-len*0.18,len,0);
        ctx.quadraticCurveTo(len*0.25,len*0.18,0,0);
        const hue = (hueBase+l*20+i*4+300)%360;
        ctx.fillStyle = `hsla(${hue},70%,70%,0.18)`;
        ctx.fill();
        ctx.restore();
      }
    }
    const glowR = 20+bass*0.2+beatFlash*15;
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);
    grad.addColorStop(0, `hsla(50,90%,80%,0.6)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,glowR,0,Math.PI*2); ctx.fill();
  }

  // --- Feedback Echo: classic video-feedback tunnel — the canvas continuously folds into itself ---
  let feedbackCanvas = null, feedbackCtx = null;
  let feedbackSeeded = false;
  function drawFeedbackEcho(bass,mid,treble,overall){
    if(!feedbackCanvas){
      feedbackCanvas = document.createElement('canvas');
      feedbackCanvas.width=W; feedbackCanvas.height=H;
      feedbackCtx = feedbackCanvas.getContext('2d');
    }
    if(feedbackCanvas.width!==W || feedbackCanvas.height!==H){
      feedbackCanvas.width=W; feedbackCanvas.height=H;
    }
    const cx=W/2, cy=H/2;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(0.008+bass*0.00005+beatFlash*0.025);
    const s = 1.016+beatFlash*0.012;
    ctx.scale(s,s);
    ctx.translate(-cx,-cy);
    ctx.globalAlpha = 0.95;
    ctx.drawImage(feedbackCanvas,0,0,W,H);
    ctx.restore();

    if(!feedbackSeeded){
      // instant starting pattern — otherwise this mode needs several seconds to build up from nothing
      for(let k=0;k<6;k++){
        ctx.beginPath(); ctx.arc(cx,cy,30+k*22,0,Math.PI*2);
        ctx.strokeStyle = `hsla(${(hueBase+k*40)%360},90%,65%,0.6)`;
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      feedbackSeeded = true;
    }

    const sides = 5+Math.floor(bass/60);
    const r = 26+beatFlash*24;
    ctx.beginPath();
    for(let i=0;i<=sides;i++){
      const ang=(Math.PI*2/sides)*i + rotation*2;
      const x=cx+Math.cos(ang)*r, y=cy+Math.sin(ang)*r;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    grad.addColorStop(0, `hsla(${hueBase%360},95%,70%,0.6)`);
    grad.addColorStop(1, `hsla(${hueBase%360},95%,70%,0)`);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `hsla(${hueBase%360},90%,65%,0.85)`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    feedbackCtx.clearRect(0,0,W,H);
    feedbackCtx.drawImage(ctx.canvas,0,0,W,H);
  }

  // --- Fractal Flame: an iterated-function-system "chaos game" building a glowing fractal over time ---
  let flameState = null;
  function drawFractalFlame(bass,mid,treble,overall){
    if(!flameState) flameState = { x:0.1, y:0.1, hue:Math.random()*360 };
    const cx=W/2, cy=H/2;
    const scale = Math.min(W,H)*0.42;
    const t = performance.now()*0.00007;
    const variants = [
      (x,y)=>[0.5*x - 0.3*Math.sin(t)*y, 0.3*Math.sin(t)*x + 0.5*y + 0.3],
      (x,y)=>[0.5*x + 0.3*Math.cos(t)*y - 0.2, -0.3*y + 0.1*x],
      (x,y)=>[-0.5*y + 0.15, 0.5*x + 0.15*Math.sin(t*2)],
      (x,y)=>[0.5*x*Math.cos(1.3) - 0.5*y*Math.sin(1.3), 0.5*x*Math.sin(1.3)+0.5*y*Math.cos(1.3)]
    ];
    const iters = 2200 + Math.floor(overall*4);
    let {x,y,hue} = flameState;
    for(let i=0;i<iters;i++){
      const idx = Math.floor(Math.random()*variants.length);
      const [nx,ny] = variants[idx](x,y);
      x=nx; y=ny;
      hue = hue*0.995 + (idx*90+hueBase)*0.005;
      if(i>15){
        const px = cx + x*scale, py = cy + y*scale;
        ctx.fillStyle = `hsla(${hue%360},85%,${55+beatFlash*15}%,0.5)`;
        ctx.fillRect(px,py,1.1,1.1);
      }
    }
    flameState = {x,y,hue};
  }

  // --- De Jong Attractor: a strange attractor whose shape itself dances with the audio ---
  let dejongState = { x:0.1, y:0.1 };
  function drawDeJong(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const scale = Math.min(W,H)*0.22;
    const a = -2 + (bass/255)*4;
    const b = -0.5 + (mid/255)*4;
    const c = -0.5 + Math.sin(rotation)*1.5;
    const d = -1.5 + (treble/255)*3;
    let {x,y} = dejongState;
    const iters = 900;
    for(let i=0;i<iters;i++){
      const nx = Math.sin(a*y) - Math.cos(b*x);
      const ny = Math.sin(c*x) - Math.cos(d*y);
      x=nx; y=ny;
      const px = cx + x*scale, py = cy + y*scale;
      const hue = (hueBase + i*0.3)%360;
      ctx.fillStyle = `hsla(${hue},85%,65%,0.4)`;
      ctx.fillRect(px,py,1,1);
    }
    dejongState = {x,y};
  }

  // --- Lorenz Attractor: the classic chaos-theory "butterfly", traced continuously in 3D ---
  let lorenzState = { x:0.1, y:0, z:0 };
  function drawLorenz(bass,mid,treble,overall){
    const cx=W/2, cy=H/2-40;
    const scale = Math.min(W,H)*0.011; // was 10x too large — attractor was drawing off-canvas
    const sigma=10, rho=24+bass*0.02, beta=8/3;
    const dt2=0.006;
    let {x,y,z} = lorenzState;
    const ang = rotation*1.2;
    ctx.beginPath();
    let first=true;
    for(let i=0;i<12;i++){
      const dx = sigma*(y-x)*dt2, dy=(x*(rho-z)-y)*dt2, dz=(x*y-beta*z)*dt2;
      x+=dx; y+=dy; z+=dz;
      const zc = z - rho; // z ranges roughly 0..50, not centered on zero — recenter before projecting
      const rx = x*Math.cos(ang) - zc*Math.sin(ang);
      const rz = x*Math.sin(ang) + zc*Math.cos(ang);
      const px = cx+rx*scale, py = cy+y*scale*0.9 - rz*scale*0.4;
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    }
    const hue=(hueBase+z*4)%360;
    ctx.strokeStyle = `hsla(${hue},85%,65%,0.7)`;
    ctx.lineWidth = 1.6+beatFlash*1.8;
    ctx.stroke();
    lorenzState = {x,y,z};
  }

  // --- Phyllotaxis Spiral: the golden-angle seed pattern found in sunflowers, slowly growing ---
  let phyllotaxisSeeds = 0;
  function drawPhyllotaxis(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const golden = Math.PI*(3-Math.sqrt(5));
    const maxSeeds = 500;
    phyllotaxisSeeds = (phyllotaxisSeeds + 1 + Math.floor(overall*0.05)) % maxSeeds;
    const c = 4.2 + bass*0.02;
    for(let i=0;i<phyllotaxisSeeds;i++){
      const ang = i*golden;
      const r = c*Math.sqrt(i);
      const x = cx+Math.cos(ang+rotation*0.2)*r, y=cy+Math.sin(ang+rotation*0.2)*r;
      const hue = (hueBase + i*0.6)%360;
      ctx.fillStyle = `hsla(${hue},80%,62%,0.8)`;
      ctx.beginPath(); ctx.arc(x,y,2+beatFlash*2,0,Math.PI*2); ctx.fill();
    }
  }

  // --- Moiré Rings: two ring-sets drifting apart, producing a shimmering interference pattern ---
  function drawMoire(bass,mid,treble,overall){
    const cx1=W/2-40-bass*0.3, cy1=H/2;
    const cx2=W/2+40+bass*0.3, cy2=H/2;
    for(let i=0;i<26;i++){
      const r=(i+1)*14;
      ctx.beginPath(); ctx.arc(cx1,cy1,r,0,Math.PI*2);
      ctx.strokeStyle = `hsla(${hueBase%360},70%,60%,0.25)`;
      ctx.lineWidth=1.2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2);
      ctx.strokeStyle = `hsla(${(hueBase+120)%360},70%,60%,0.25)`;
      ctx.stroke();
    }
  }

  // --- Spirograph: a classic hypotrochoid curve traced continuously, shape drifting with the music ---
  let spiroT = 0, spiroPts = [];
  function drawSpirograph(bass,mid,treble,overall){
    spiroT += 0.02+overall*0.0005;
    const R=Math.min(W,H)*0.28, r=40+bass*0.3, d=60+mid*0.3;
    const cx=W/2, cy=H/2;
    for(let s=0;s<6;s++){
      const t = spiroT + s*0.01;
      const x = cx + (R-r)*Math.cos(t) + d*Math.cos((R-r)/r*t);
      const y = cy + (R-r)*Math.sin(t) - d*Math.sin((R-r)/r*t);
      spiroPts.push({x,y,hue:hueBase});
    }
    if(spiroPts.length>2000) spiroPts.splice(0, spiroPts.length-2000);
    for(const p of spiroPts){
      ctx.fillStyle = `hsla(${p.hue%360},85%,65%,0.5)`;
      ctx.fillRect(p.x,p.y,1.4,1.4);
    }
  }

  // --- Voronoi Cells: living cell regions that drift and occasionally divide on a big beat ---
  let voronoiSeeds = null, voronoiBuf = null;
  function ensureVoronoi(){
    if(voronoiSeeds) return;
    voronoiSeeds = [];
    for(let i=0;i<10;i++) voronoiSeeds.push({ x:Math.random(), y:Math.random(), vx:(Math.random()-0.5)*0.002, vy:(Math.random()-0.5)*0.002, hue:Math.random()*360 });
    const w=100,h=60;
    const off = document.createElement('canvas'); off.width=w; off.height=h;
    voronoiBuf = { w,h,off,offCtx:off.getContext('2d') };
  }
  function drawVoronoiCells(bass,mid,treble,overall){
    ensureVoronoi();
    for(const s of voronoiSeeds){
      s.x += s.vx*(1+overall*0.02); s.y += s.vy*(1+overall*0.02);
      if(s.x<0||s.x>1) s.vx*=-1;
      if(s.y<0||s.y>1) s.vy*=-1;
    }
    if(beatFlash>0.9 && voronoiSeeds.length<22 && Math.random()<0.3){
      const parent = voronoiSeeds[Math.floor(Math.random()*voronoiSeeds.length)];
      voronoiSeeds.push({ x:parent.x, y:parent.y, vx:(Math.random()-0.5)*0.003, vy:(Math.random()-0.5)*0.003, hue:parent.hue+40 });
    }
    const { w,h,off,offCtx } = voronoiBuf;
    const img = offCtx.createImageData(w,h);
    for(let py=0;py<h;py++){
      for(let px=0;px<w;px++){
        const nx=px/w, ny=py/h;
        let best=1e9, bi=0;
        for(let i=0;i<voronoiSeeds.length;i++){
          const s=voronoiSeeds[i];
          const dd=(s.x-nx)*(s.x-nx)+(s.y-ny)*(s.y-ny);
          if(dd<best){ best=dd; bi=i; }
        }
        const hue=(hueBase+voronoiSeeds[bi].hue)%360;
        const [r,g,b] = hslToRgb(((hue%360)+360)%360/360, 0.65, Math.max(0.12,Math.min(0.55,0.16+Math.sqrt(best)*0.8)));
        const idx=(py*w+px)*4;
        img.data[idx]=r; img.data[idx+1]=g; img.data[idx+2]=b; img.data[idx+3]=255;
      }
    }
    offCtx.putImageData(img,0,0);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(off,0,0,w,h,0,0,W,H);
  }

  // --- Melting Drip: soft Dali-esque blobs slowly drooping and dripping downward ---
  let meltBlobs = null;
  function drawMelt(bass,mid,treble,overall){
    if(!meltBlobs){
      meltBlobs = [];
      for(let i=0;i<5;i++) meltBlobs.push({ x:(i+0.5)*(W/5), y:H*0.25+Math.random()*80, r:50+Math.random()*40, hue:Math.random()*360, drip:0 });
    }
    for(const b of meltBlobs){
      b.drip += 0.3+overall*0.01+beatFlash*1.5;
      const dripLen = 60+b.drip*0.5;
      ctx.beginPath();
      ctx.moveTo(b.x-b.r, b.y);
      ctx.quadraticCurveTo(b.x-b.r, b.y+dripLen*0.6, b.x-b.r*0.3, b.y+dripLen);
      ctx.quadraticCurveTo(b.x, b.y+dripLen*1.1, b.x+b.r*0.3, b.y+dripLen);
      ctx.quadraticCurveTo(b.x+b.r, b.y+dripLen*0.6, b.x+b.r, b.y);
      ctx.arc(b.x,b.y,b.r,0,Math.PI,true);
      ctx.closePath();
      const hue=(hueBase+b.hue)%360;
      const grad = ctx.createLinearGradient(b.x,b.y-b.r,b.x,b.y+dripLen);
      grad.addColorStop(0, `hsla(${hue},75%,60%,0.5)`);
      grad.addColorStop(1, `hsla(${hue},75%,60%,0.05)`);
      ctx.fillStyle = grad;
      ctx.fill();
      if(b.drip>250){ b.drip=0; b.y=H*0.2+Math.random()*60; b.hue=Math.random()*360; }
    }
  }

  // --- Infinite Mirror: a genuine recursive hall-of-mirrors, built from real image feedback ---
  let mirrorBuf = null;
  function drawInfiniteMirror(bass,mid,treble,overall){
    if(!mirrorBuf){ mirrorBuf = document.createElement('canvas'); mirrorBuf.width=W; mirrorBuf.height=H; }
    if(mirrorBuf.width!==W || mirrorBuf.height!==H){ mirrorBuf.width=W; mirrorBuf.height=H; }
    const mctx = mirrorBuf.getContext('2d');
    mctx.clearRect(0,0,W,H);
    mctx.drawImage(ctx.canvas,0,0,W,H);
    const cx=W/2, cy=H/2;
    const inset = 60+Math.sin(rotation)*10;
    const w2=Math.max(10,W-inset*2), h2=Math.max(10,H-inset*2);
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(0.01+beatFlash*0.03);
    ctx.translate(-cx,-cy);
    ctx.drawImage(mirrorBuf, inset,inset,w2,h2);
    ctx.restore();
    ctx.strokeStyle = `hsla(${hueBase%360},70%,60%,0.8)`;
    ctx.lineWidth = 6+beatFlash*4;
    ctx.strokeRect(inset,inset,w2,h2);
  }

  // --- Tie-Dye Swirl: rainbow rings twisted into a spiral, like fabric dye ---
  function drawTieDye(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const maxR = Math.hypot(W,H)/2;
    const twist = 2.5+Math.sin(rotation)*1.5;
    for(let r=4;r<maxR;r+=6){
      const bands=24;
      ctx.beginPath();
      for(let i=0;i<=bands;i++){
        const ang=(Math.PI*2/bands)*i;
        const rr = r + Math.sin(ang*5+r*0.02+performance.now()*0.0003)*4;
        const x=cx+Math.cos(ang)*rr, y=cy+Math.sin(ang)*rr;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      const hue=(hueBase + r*twist*0.3 + treble*0.3)%360;
      ctx.strokeStyle = `hsla(${hue},85%,60%,0.4)`;
      ctx.lineWidth = 5.4;
      ctx.stroke();
    }
  }

  // --- Ink Marbling: concentric rings dragged by drifting "combs", like Suminagashi paper marbling ---
  let marbleCombs = null;
  function drawMarbling(bass,mid,treble,overall){
    if(!marbleCombs){
      marbleCombs = [];
      for(let i=0;i<3;i++) marbleCombs.push({ ang:Math.random()*Math.PI*2, speed:0.5+Math.random()*0.5, x:0, y:0 });
    }
    const cx=W/2, cy=H/2;
    for(const comb of marbleCombs){
      comb.ang += 0.01;
      comb.x = cx + Math.cos(comb.ang*comb.speed)*W*0.3;
      comb.y = cy + Math.sin(comb.ang*comb.speed*1.3)*H*0.3;
    }
    for(let i=0;i<20;i++){
      const baseR = 20+i*14;
      ctx.beginPath();
      const segs=48;
      for(let s=0;s<=segs;s++){
        const ang=(Math.PI*2/segs)*s;
        let x=cx+Math.cos(ang)*baseR, y=cy+Math.sin(ang)*baseR;
        for(const comb of marbleCombs){
          const dx=x-comb.x, dy=y-comb.y;
          const dist=Math.hypot(dx,dy);
          const pull = Math.max(0, 1 - dist/120)*20;
          x += (dx/(dist||1))*pull*0.3;
          y += (dy/(dist||1))*pull*0.3;
        }
        if(s===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      const hue=(hueBase+i*15)%360;
      ctx.strokeStyle = `hsla(${hue},75%,60%,0.35)`;
      ctx.lineWidth=2;
      ctx.stroke();
    }
  }

  // --- Yantra Geometry: breathing interlocking sacred triangles ---
  function drawYantra(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const breathe = 0.8+0.2*Math.sin(performance.now()*0.0008)+beatFlash*0.2;
    const size = Math.min(W,H)*0.35*breathe;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotation*0.2);
    for(let i=0;i<5;i++){
      const s = size*(1-i*0.15);
      drawTri(s, true, (hueBase+i*20)%360);
      drawTri(s*0.85, false, (hueBase+180+i*20)%360);
    }
    ctx.restore();
    function drawTri(s, up, hue){
      ctx.beginPath();
      const dir = up?1:-1;
      ctx.moveTo(0, -s*dir*0.6);
      ctx.lineTo(-s*0.55, s*dir*0.4);
      ctx.lineTo(s*0.55, s*dir*0.4);
      ctx.closePath();
      ctx.strokeStyle = `hsla(${hue},80%,65%,0.5)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // --- Metatron's Cube: 13 sacred-geometry points fully interconnected, slowly rotating ---
  let metatronPts = null;
  function drawMetatron(bass,mid,treble,overall){
    if(!metatronPts){
      metatronPts = [{x:0,y:0}];
      for(let ring=0; ring<2; ring++){
        const count=6, rad=(ring+1)*70;
        for(let i=0;i<count;i++){
          const ang=(Math.PI*2/count)*i + (ring*Math.PI/6);
          metatronPts.push({ x:Math.cos(ang)*rad, y:Math.sin(ang)*rad });
        }
      }
    }
    const cx=W/2, cy=H/2;
    const scale = 0.9+Math.sin(performance.now()*0.0005)*0.05+beatFlash*0.1;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotation*0.3); ctx.scale(scale,scale);
    for(let i=0;i<metatronPts.length;i++){
      for(let j=i+1;j<metatronPts.length;j++){
        const a=metatronPts[i], b=metatronPts[j];
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        const hue=(hueBase + i*10+j*5)%360;
        ctx.strokeStyle = `hsla(${hue},75%,60%,0.18)`;
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }
    for(const p of metatronPts){
      ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2);
      ctx.fillStyle = `hsla(${hueBase%360},85%,70%,0.7)`;
      ctx.fill();
    }
    ctx.restore();
  }

  // --- Water Ripples: rain-on-a-pond rings that overlap and interfere ---
  let waterDrops = [];
  function drawWaterRings(bass,mid,treble,overall){
    if(Math.random() < 0.02+bass*0.0006){
      waterDrops.push({ x:Math.random()*W, y:Math.random()*H, r:2, hue:hueBase+Math.random()*80 });
    }
    for(let i=waterDrops.length-1;i>=0;i--){
      const d = waterDrops[i];
      d.r += 1.5+overall*0.01;
      const alpha = Math.max(0, 1-d.r/260);
      if(alpha<=0){ waterDrops.splice(i,1); continue; }
      ctx.strokeStyle = `hsla(${d.hue%360},70%,70%,${alpha*0.5})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.stroke();
    }
    if(waterDrops.length>60) waterDrops.splice(0, waterDrops.length-60);
  }

  // --- Boid Swarm: a flock of glowing particles with real separation/alignment/cohesion behavior ---
  let boids = null;
  function drawBoidSwarm(bass,mid,treble,overall){
    if(!boids){
      boids = [];
      for(let i=0;i<60;i++) boids.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2 });
    }
    const cx=W/2, cy=H/2;
    for(const b of boids){
      let ax=0,ay=0,cxAvg=0,cyAvg=0,sepX=0,sepY=0,count=0;
      for(const o of boids){
        if(o===b) continue;
        const dx=o.x-b.x, dy=o.y-b.y, d=Math.hypot(dx,dy)||1;
        if(d<60){
          cxAvg+=o.x; cyAvg+=o.y; count++;
          ax+=o.vx; ay+=o.vy;
          if(d<20){ sepX -= dx/d; sepY -= dy/d; }
        }
      }
      if(count>0){
        cxAvg/=count; cyAvg/=count;
        b.vx += (cxAvg-b.x)*0.0005 + (ax/count-b.vx)*0.02 + sepX*0.05;
        b.vy += (cyAvg-b.y)*0.0005 + (ay/count-b.vy)*0.02 + sepY*0.05;
      }
      b.vx += (cx-b.x)*0.00008; b.vy += (cy-b.y)*0.00008;
      const speed = Math.hypot(b.vx,b.vy);
      const maxSpeed = 2+overall*0.02+beatFlash*3;
      if(speed>maxSpeed){ b.vx=b.vx/speed*maxSpeed; b.vy=b.vy/speed*maxSpeed; }
      b.x+=b.vx; b.y+=b.vy;
      const hue = (hueBase + Math.atan2(b.vy,b.vx)*40)%360;
      ctx.fillStyle = `hsla(${hue},85%,65%,0.8)`;
      ctx.beginPath(); ctx.arc(b.x,b.y,2.4,0,Math.PI*2); ctx.fill();
    }
  }

  // --- String Art: a mod-multiplication chord pattern that continuously evolves through new curves ---
  let stringArtT = 0;
  function drawStringArt(bass,mid,treble,overall){
    stringArtT += 0.002+overall*0.00003;
    const cx=W/2, cy=H/2;
    const R = Math.min(W,H)*0.4;
    const points = 140;
    const m = 2 + (stringArtT%20);
    ctx.beginPath();
    for(let i=0;i<points;i++){
      const ang1=(Math.PI*2/points)*i;
      const j=Math.floor(i*m)%points;
      const ang2=(Math.PI*2/points)*j;
      const x1=cx+Math.cos(ang1)*R, y1=cy+Math.sin(ang1)*R;
      const x2=cx+Math.cos(ang2)*R, y2=cy+Math.sin(ang2)*R;
      ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    }
    ctx.strokeStyle = `hsla(${hueBase%360},80%,65%,0.12)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // --- Kaleido Fractal: a filled, textured fractal-noise kaleidoscope (not just outlines) ---
  let kfBuf = null;
  function ensureKF(){
    if(kfBuf) return;
    const w=140,h=90;
    const off = document.createElement('canvas'); off.width=w; off.height=h;
    kfBuf = { w,h,off,offCtx:off.getContext('2d') };
  }
  function drawKaleidoFractal(bass,mid,treble,overall){
    ensureKF();
    const { w,h,off,offCtx } = kfBuf;
    const img = offCtx.createImageData(w,h);
    const cx=w/2, cy=h/2;
    const wedges = 6 + Math.floor(bass/60);
    const wedgeAng = Math.PI*2/wedges;
    const t = performance.now()*0.00025;
    for(let py=0;py<h;py++){
      for(let px=0;px<w;px++){
        const dx=px-cx, dy=py-cy;
        let ang=Math.atan2(dy,dx), r=Math.hypot(dx,dy);
        ang = ang % wedgeAng;
        if(ang<0) ang+=wedgeAng;
        if(ang>wedgeAng/2) ang = wedgeAng-ang;
        const sx = Math.cos(ang)*r, sy=Math.sin(ang)*r;
        const n = noise2(sx*0.09, sy*0.09, t) + noise2(sx*0.2+10,sy*0.2+10,t*1.4)*0.5;
        const hue = (((hueBase + n*160 + r*2)%360)+360)%360;
        const light = Math.max(0.1,Math.min(0.8, 0.35+0.25*n));
        const idx=(py*w+px)*4;
        const [r8,g8,b8] = hslToRgb(hue/360, 0.75, light);
        img.data[idx]=r8; img.data[idx+1]=g8; img.data[idx+2]=b8; img.data[idx+3]=255;
      }
    }
    offCtx.putImageData(img,0,0);
    ctx.imageSmoothingEnabled = true;
    ctx.save();
    ctx.translate(W/2,H/2); ctx.rotate(rotation*0.5); ctx.translate(-W/2,-H/2);
    ctx.drawImage(off,0,0,w,h,0,0,W,H);
    ctx.restore();
  }

  // --- Crystal Growth: branching ice-crystal-like growth spreading from a seed, then resetting ---
  let crystalBranches = null;
  function drawCrystalGrowth(bass,mid,treble,overall){
    if(!crystalBranches || Math.random()<0.0015){
      crystalBranches = [];
      const seedCount = 8;
      for(let i=0;i<seedCount;i++){
        crystalBranches.push({ x:W/2, y:H/2, ang:(Math.PI*2/seedCount)*i, len:0, maxLen:60+Math.random()*40, hue:hueBase+i*20 });
      }
    }
    const newBranches = [];
    for(const b of crystalBranches){
      if(b.len>=b.maxLen) continue;
      const grow = 2.2+beatFlash*3.5;
      const x2=b.x+Math.cos(b.ang)*grow, y2=b.y+Math.sin(b.ang)*grow;
      ctx.strokeStyle = `hsla(${b.hue%360},70%,70%,0.6)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(x2,y2); ctx.stroke();
      b.x=x2; b.y=y2; b.len+=grow;
      if(Math.random()<0.06 && crystalBranches.length<200){
        newBranches.push({ x:b.x, y:b.y, ang:b.ang+(Math.random()<0.5?1:-1)*Math.PI/3, len:0, maxLen:25+Math.random()*35, hue:b.hue+20 });
      }
      if(b.x<0||b.x>W||b.y<0||b.y>H) b.len=b.maxLen;
    }
    crystalBranches.push(...newBranches);
    if(crystalBranches.length>240) crystalBranches = crystalBranches.slice(-240);
  }

  // --- Opalescence: a slow iridescent oil-slick color wash across the whole screen ---
  function drawOpalescence(bass,mid,treble,overall){
    const t = performance.now()*0.0002;
    const cellSize = 26;
    for(let y=0;y<H;y+=cellSize){
      for(let x=0;x<W;x+=cellSize){
        const n = noise2(x*0.01,y*0.01,t) + noise2(x*0.03+50,y*0.03+50,t*1.7)*0.5;
        const hue = (((hueBase + n*200 + (x+y)*0.05)%360)+360)%360;
        const light = Math.max(20,Math.min(70, 45+n*20+beatFlash*10));
        ctx.fillStyle = `hsla(${hue},70%,${light}%,0.32)`;
        ctx.fillRect(x,y,cellSize+1,cellSize+1);
      }
    }
  }

  // ============================================================
  // Retro 8-bit hero archetypes — original blocky characters and scenes,
  // inspired by classic action-platformer energy. No existing characters,
  // names, or specific game likenesses are used; these are original designs.
  // ============================================================

  // --- shared retro engine: screen shake, particle bursts, animated pixel hero ---
  let retroShake = 0;
  let retroPix = [];
  function retroKick(amt){ retroShake = Math.min(18, retroShake + amt); }
  function retroSpark(x,y,hue,n,opt){
    opt = opt||{};
    for(let i=0;i<n;i++){
      const base = (opt.dir!==undefined) ? opt.dir : Math.random()*Math.PI*2;
      const a = base + (Math.random()-0.5)*(opt.spread!==undefined?opt.spread:Math.PI*2);
      const sp = (opt.speed||3)*(0.35+Math.random());
      retroPix.push({
        x, y,
        vx: Math.cos(a)*sp + (opt.vx||0),
        vy: Math.sin(a)*sp + (opt.vy||0),
        life: 1, dl: opt.dl||0.03, g: opt.g||0,
        hue: hue + (Math.random()-0.5)*(opt.hueSpread!==undefined?opt.hueSpread:50),
        sat: opt.sat||95, lig: opt.lig||62,
        sz: (opt.sz||3)*(0.6+Math.random()*0.9),
        shape: opt.shape||'sq'
      });
    }
  }
  function updateRetroPix(){
    for(let i=retroPix.length-1;i>=0;i--){
      const p = retroPix[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.99; p.life-=p.dl;
      if(p.life<=0){ retroPix.splice(i,1); continue; }
      const h=((p.hue%360)+360)%360;
      ctx.fillStyle=`hsla(${h},${p.sat}%,${p.lig}%,${Math.max(0,p.life)})`;
      const s=p.sz*(0.4+p.life);
      if(p.shape==='sq') ctx.fillRect(p.x-s/2,p.y-s/2,s,s);
      else { ctx.beginPath(); ctx.arc(p.x,p.y,s*0.6,0,Math.PI*2); ctx.fill(); }
    }
    if(retroPix.length>460) retroPix.splice(0, retroPix.length-460);
  }
  function retroBeginScene(bass,mid,treble,overall){
    // called at top of every retro scene: builds screen shake off the beat
    if(beatFlash>0.7) retroKick((beatFlash-0.55)*16);
    retroShake *= 0.85;
    const sx=(Math.random()-0.5)*retroShake, sy=(Math.random()-0.5)*retroShake;
    ctx.save(); ctx.translate(sx,sy);
  }
  function retroEndScene(){ updateRetroPix(); ctx.restore(); }

  function limbSeg(px,py,len,wide,ang,col){
    ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
    ctx.fillStyle=col; ctx.fillRect(-wide/2,0,wide,len);
    ctx.restore();
    return { x: px - Math.sin(ang)*len, y: py + Math.cos(ang)*len };
  }
  function shade(hex, amt){
    // hex like '#rrggbb' -> lighten/darken by amt (-100..100)
    const n=parseInt(hex.slice(1),16);
    let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  // Animated blocky hero. Feet sit at (cx,feetY). Returns the front-hand world point.
  function drawPixelHero(cx, feetY, o){
    const p=o.scale||3, ph=o.phase||0;
    const grounded=o.grounded!==false;
    const run = grounded?1:0.28;
    const bob = grounded? Math.abs(Math.sin(ph))*1.0*p : 0.5*p;
    const dir=(o.faceRight===false)?-1:1;
    const skin=o.skin||'#f2c398', shirt=o.shirt||'#3a6bd6', pants=o.pants||'#22357a',
          accent=o.accent||'#e63a2e', hat=o.hat, boot=o.boot||'#241608';
    const yb=feetY-bob;
    // soft shadow on ground
    ctx.fillStyle='rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(cx, feetY+2*p, 6*p*(0.7+bob/(3*p)*0.3), 1.8*p, 0,0,Math.PI*2); ctx.fill();

    ctx.save(); ctx.translate(cx, yb); ctx.scale(dir,1);
    const hipY=-5*p, shoY=-11.5*p, headTop=-17*p, headH=4.4*p;
    const sw=Math.sin(ph)*0.5*run;

    // back leg + boot
    let f=limbSeg(-0.7*p, hipY, 5*p, 2.3*p, -sw, shade(pants,-22));
    ctx.fillStyle=shade(boot,-10); ctx.fillRect(f.x-1.4*p, f.y-0.3*p, 3.4*p, 1.6*p);
    // front leg + boot
    f=limbSeg(0.9*p, hipY, 5*p, 2.3*p, sw, pants);
    ctx.fillStyle=boot; ctx.fillRect(f.x-1.4*p, f.y-0.3*p, 3.4*p, 1.6*p);

    // back arm (swings opposite front)
    const backAng = -Math.PI*0.15 + Math.sin(ph+Math.PI)*0.45*run;
    limbSeg(-1.6*p, shoY+0.6*p, 4.6*p, 2*p, backAng, shade(shirt,-28));

    // torso
    ctx.fillStyle=shirt; ctx.fillRect(-2.7*p, shoY, 5.4*p, (hipY-shoY)+1.2*p);
    ctx.fillStyle=accent; ctx.fillRect(-2.7*p, hipY-1.6*p, 5.4*p, 2.4*p); // belt
    ctx.fillStyle=shade(shirt,20); ctx.fillRect(-2.7*p, shoY, 5.4*p, 1.3*p); // shoulder highlight

    // head
    ctx.fillStyle=skin; ctx.fillRect(-2.2*p, headTop, 4.4*p, headH);
    ctx.fillStyle=shade(skin,-30); ctx.fillRect(1.2*p, headTop+1.4*p, 0.9*p, 0.9*p); // eye (faces right)
    if(hat){
      ctx.fillStyle=hat; ctx.fillRect(-2.7*p, headTop-1.4*p, 5.4*p, 2.2*p);
      ctx.fillRect(1.2*p, headTop+0.2*p, 3.2*p, 1.1*p); // brim
    }

    // front arm + weapon
    const aim = (o.aim!==undefined)? o.aim : (-Math.PI*0.5 + Math.sin(ph)*0.5*run + 0.4);
    const shX=1.8*p, shY=shoY+0.6*p, upLen=4.8*p;
    const hand = limbSeg(shX, shY, upLen, 2.1*p, aim, shirt);
    let tipLocalX=hand.x, tipLocalY=hand.y;
    ctx.fillStyle=skin; ctx.fillRect(hand.x-1*p, hand.y-1*p, 2*p, 2*p); // fist
    const dux=-Math.sin(aim), duy=Math.cos(aim); // unit dir of arm
    if(o.weapon==='gun'){
      ctx.fillStyle='#2b2f38';
      ctx.save(); ctx.translate(hand.x,hand.y); ctx.rotate(aim);
      ctx.fillRect(-1.3*p,0,2.6*p,4.2*p); ctx.restore();
      tipLocalX=hand.x+dux*4.6*p; tipLocalY=hand.y+duy*4.6*p;
    } else if(o.weapon==='cannon'){
      ctx.save(); ctx.translate(hand.x,hand.y); ctx.rotate(aim);
      ctx.fillStyle='#8892a6'; ctx.fillRect(-2.1*p,0,4.2*p,5*p);
      ctx.fillStyle='#c9d3e6'; ctx.fillRect(-2.1*p,0,4.2*p,1.2*p);
      ctx.restore();
      tipLocalX=hand.x+dux*5.2*p; tipLocalY=hand.y+duy*5.2*p;
    } else if(o.weapon==='sword'){
      const bl=o.bladeLen||11*p;
      ctx.save(); ctx.translate(hand.x,hand.y); ctx.rotate(aim);
      ctx.fillStyle='#c9c9c9'; ctx.fillRect(-1.2*p,0,2.4*p,1.4*p); // guard
      const g=ctx.createLinearGradient(0,0,0,bl);
      g.addColorStop(0,'#ffffff'); g.addColorStop(1,`hsl(${o.bladeHue||190},90%,70%)`);
      ctx.fillStyle=g; ctx.fillRect(-0.7*p,1.4*p,1.4*p,bl);
      ctx.restore();
      tipLocalX=hand.x+dux*(bl+1.4*p); tipLocalY=hand.y+duy*(bl+1.4*p);
    } else if(o.weapon==='fist'){
      ctx.fillStyle=accent; ctx.fillRect(hand.x-1.6*p, hand.y-1.6*p, 3.2*p, 3.2*p);
      tipLocalX=hand.x+dux*2*p; tipLocalY=hand.y+duy*2*p;
    }
    ctx.restore();
    return { x: cx + dir*tipLocalX, y: yb + tipLocalY, dir, yb };
  }

  // colorful parallax hill band
  function retroHills(scroll, baseY, amp, step, hue, alpha){
    ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=step){
      const y = baseY + Math.sin((x+scroll)*0.004)*amp + Math.sin((x+scroll)*0.011+1.7)*amp*0.4;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H); ctx.closePath();
    ctx.fillStyle=`hsla(${((hue%360)+360)%360},60%,${40}%,${alpha})`; ctx.fill();
  }

  // ============================================================
  // Pixel Plumber Hero — a bright, coin-scattering platformer run.
  // ============================================================
  let plumberS = { scroll:0, run:0, vy:0, jump:0, grounded:true, enemies:[], coins:[], blocks:[], clouds:null, flag:0, birds:null, spawnT:0 };
  function drawRetroPlumber(bass,mid,treble,overall){
    const S=plumberS, now=performance.now();
    retroBeginScene(bass,mid,treble,overall);
    const h=hueBase%360, groundY=H*0.80;

    // vivid sky
    const sky=ctx.createLinearGradient(0,0,0,groundY);
    sky.addColorStop(0,`hsl(${(h+205)%360},72%,52%)`);
    sky.addColorStop(0.55,`hsl(${(h+188)%360},80%,66%)`);
    sky.addColorStop(1,`hsl(${(h+165)%360},85%,82%)`);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,groundY);
    // sun with rays
    const sunX=W*0.82, sunY=H*0.2, sunR=44+bass*0.35+beatFlash*22;
    ctx.save(); ctx.translate(sunX,sunY); ctx.rotate(now*0.0002);
    for(let i=0;i<12;i++){ ctx.rotate(Math.PI/6); ctx.fillStyle=`hsla(50,100%,72%,${0.10+beatFlash*0.2})`; ctx.fillRect(0,-4,sunR*2.4,8); }
    ctx.restore();
    const sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR);
    sg.addColorStop(0,'#fff7d6'); sg.addColorStop(1,`hsla(45,100%,64%,0.15)`);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

    // world scroll speed rides the music
    const speed = 2.4 + overall*0.03 + beatFlash*3;
    S.scroll += speed;

    // clouds (slow parallax)
    if(!S.clouds){ S.clouds=[]; for(let i=0;i<6;i++) S.clouds.push({x:Math.random()*W, y:H*(0.08+Math.random()*0.28), s:0.5+Math.random()*0.9}); }
    for(const c of S.clouds){
      c.x-=speed*0.12*c.s; if(c.x<-140) c.x=W+80, c.y=H*(0.08+Math.random()*0.3);
      ctx.fillStyle=`rgba(255,255,255,${0.55+0.2*Math.sin(now*0.001+c.x)})`;
      for(const d of [[0,0,34],[26,6,26],[-24,6,24],[6,-10,22]]) { ctx.beginPath(); ctx.arc(c.x+d[0]*c.s, c.y+d[1]*c.s, d[2]*c.s,0,Math.PI*2); ctx.fill(); }
    }
    // birds
    if(!S.birds){ S.birds=[]; for(let i=0;i<5;i++) S.birds.push({x:Math.random()*W,y:H*(0.15+Math.random()*0.2),f:Math.random()*6}); }
    for(const b of S.birds){ b.x-=speed*0.4; b.f+=0.2; if(b.x<-20){b.x=W+20;b.y=H*(0.12+Math.random()*0.25);} const w=Math.sin(b.f)*5; ctx.strokeStyle='rgba(30,30,50,0.6)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(b.x-7,b.y+w); ctx.lineTo(b.x,b.y); ctx.lineTo(b.x+7,b.y+w); ctx.stroke(); }

    // far + mid hills
    retroHills(S.scroll*0.15, groundY-40, 60, 24, h+150, 0.5);
    retroHills(S.scroll*0.35, groundY-10, 46, 18, h+120, 0.7);

    // floating question blocks (mid parallax)
    for(let i=0;i<4;i++){
      const bx=((i*360 - S.scroll*0.55)%(W+200)+W+200)%(W+200)-100;
      const by=groundY-150-Math.sin(i*1.3)*20;
      const pulse=0.6+0.4*Math.sin(now*0.006+i);
      ctx.fillStyle=`hsl(${(40)%360},95%,${52+pulse*12}%)`; ctx.fillRect(bx-14,by-14,28,28);
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.font=`${20}px monospace`; ctx.textAlign='center'; ctx.fillText('?',bx,by+7);
      ctx.strokeStyle='rgba(120,70,0,0.6)'; ctx.strokeRect(bx-14,by-14,28,28);
    }

    // ground bricks scrolling
    ctx.fillStyle=`hsl(${(h+30)%360},55%,32%)`; ctx.fillRect(0,groundY,W,H-groundY);
    ctx.fillStyle=`hsl(${(h+35)%360},60%,42%)`; ctx.fillRect(0,groundY,W,8);
    const off=S.scroll% 40;
    for(let x=-off;x<W;x+=40){ ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.strokeRect(x,groundY+8,40,26); ctx.strokeRect(x+20,groundY+34,40,26); }
    for(let x=-off;x<W;x+=16){ ctx.fillStyle=`hsl(${(h+90)%360},70%,45%)`; ctx.fillRect(x,groundY-4,10,4);} // grass tips

    // hero physics: run in place, jump on beats
    S.run += 0.18 + overall*0.004 + beatFlash*0.25;
    if(S.grounded && (beatFlash>0.62)){ S.vy=-13-Math.min(6,bass*0.05); S.grounded=false; retroSpark(W*0.24, groundY, h+90, 8, {dir:Math.PI, spread:1.2, speed:3, g:0.2, sz:3}); }
    S.jump += S.vy; S.vy += 0.7;
    if(S.jump>=0){ S.jump=0; if(!S.grounded){ retroSpark(W*0.24, groundY, 40, 6, {dir:0, spread:2.4, speed:2, g:0.2}); } S.grounded=true; }
    const hx=W*0.24, feetY=groundY+S.jump;

    // coins periodically arc up on beat
    if(beatFlash>0.5 && Math.random()<0.7) S.coins.push({x:hx+30+Math.random()*40, y:groundY-30, vx:1+Math.random()*3, vy:-(6+Math.random()*4), spin:0, life:1});
    for(let i=S.coins.length-1;i>=0;i--){ const c=S.coins[i]; c.x+=c.vx; c.y+=c.vy; c.vy+=0.35; c.spin+=0.3; c.life-=0.012;
      if(c.life<=0||c.y>H){ S.coins.splice(i,1); continue; }
      const wsc=Math.abs(Math.cos(c.spin)); ctx.fillStyle=`hsl(48,100%,${55}%)`;
      ctx.beginPath(); ctx.ellipse(c.x,c.y,7*wsc+1,7,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.ellipse(c.x,c.y,3*wsc,3,0,0,Math.PI*2); ctx.fill();
    }

    // enemies march in from the right, squashed on stomp
    S.spawnT+=1; if(S.spawnT>Math.max(28,90-overall*0.4) && S.enemies.length<5){ S.spawnT=0; S.enemies.push({x:W+30, sq:0, hue:(h+130+Math.random()*80)%360}); }
    for(let i=S.enemies.length-1;i>=0;i--){ const e=S.enemies[i];
      if(e.sq===0){
        e.x -= speed*0.9;
        if(Math.abs(e.x-hx)<26 && !S.grounded && S.vy>0){ e.sq=0.01; retroSpark(e.x, groundY-8, e.hue, 18, {speed:5, sz:4}); retroKick(6); S.vy=-8; }
        const wob=Math.sin(now*0.02+e.x*0.1)*3;
        ctx.fillStyle=`hsl(${e.hue},70%,42%)`; ctx.fillRect(e.x-12, groundY-24+wob*0, 24,22);
        ctx.fillStyle=`hsl(${e.hue},75%,55%)`; ctx.fillRect(e.x-12, groundY-24, 24,7);
        ctx.fillStyle='#fff'; ctx.fillRect(e.x-7,groundY-17,5,5); ctx.fillRect(e.x+3,groundY-17,5,5);
        ctx.fillStyle='#000'; ctx.fillRect(e.x-5+wob*0.4,groundY-16,2,3); ctx.fillRect(e.x+5+wob*0.4,groundY-16,2,3);
      } else { e.sq+=0.12; ctx.fillStyle=`hsl(${e.hue},70%,42%)`; ctx.fillRect(e.x-12, groundY-6*(1-Math.min(1,e.sq)), 24, 6*(1-Math.min(1,e.sq))+1); if(e.sq>1.1) S.enemies.splice(i,1); }
      if(e.x<-30) S.enemies.splice(i,1);
    }

    // the hero
    drawPixelHero(hx, feetY, { scale:3.4, phase:S.run, grounded:S.grounded, faceRight:true,
      skin:'#f2c398', shirt:'#e0402a', pants:'#2f57c4', accent:'#f2c020', boot:'#5a3410', hat:'#e0402a',
      aim: S.grounded? (-Math.PI*0.5+Math.sin(S.run)*0.5+0.5) : -Math.PI*0.85, weapon:'fist' });

    // victory flag at right, raised on big beats
    if(beatFlash>0.82) S.flag=Math.min(1,S.flag+0.5); else S.flag*=0.985;
    const poleX=W-70;
    ctx.strokeStyle='#d8d8d8'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(poleX,groundY); ctx.lineTo(poleX,groundY-190); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(poleX,groundY-190,7,0,Math.PI*2); ctx.fill();
    const fy=groundY-190+(1-S.flag)*150;
    ctx.fillStyle=`hsl(${(h+40)%360},90%,58%)`;
    ctx.beginPath(); ctx.moveTo(poleX,fy); ctx.lineTo(poleX+40,fy+12); ctx.lineTo(poleX,fy+24); ctx.closePath(); ctx.fill();
    if(S.flag>0.7 && beatFlash>0.6) retroSpark(poleX,groundY-190,(h+40)%360,10,{speed:4,sz:3});

    retroEndScene();
  }

  // ============================================================
  // Sword Adventurer — torch-lit cavern, slashing glowing arcs through crystal beasts.
  // ============================================================
  let swordS = { scroll:0, run:0, slashes:[], monsters:[], bats:null, torches:null, spawnT:0 };
  function drawSwordAdventurer(bass,mid,treble,overall){
    const S=swordS, now=performance.now();
    retroBeginScene(bass,mid,treble,overall);
    const h=hueBase%360, groundY=H*0.82;
    const speed=2 + overall*0.028 + beatFlash*3;
    S.scroll+=speed;

    // deep cavern gradient (warm, not gray)
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,`hsl(${(h+250)%360},55%,14%)`);
    bg.addColorStop(1,`hsl(${(h+280)%360},60%,6%)`);
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // parallax stone arches
    for(let layer=0;layer<3;layer++){
      const sp=0.2+layer*0.35, alpha=0.25+layer*0.18, tint=(h+250+layer*20)%360, span=260-layer*40;
      const off=((S.scroll*sp)%span);
      for(let x=-off;x<W+span;x+=span){
        ctx.fillStyle=`hsla(${tint},45%,${16+layer*8}%,${alpha})`;
        ctx.beginPath(); ctx.moveTo(x,H); ctx.lineTo(x,H*0.35); ctx.quadraticCurveTo(x+span/2,H*0.12, x+span,H*0.35); ctx.lineTo(x+span,H); ctx.closePath(); ctx.fill();

        const cx=x+span/2, cy=H*0.3+Math.sin(x*0.01)*20;

        cg.addColorStop(0,`hsla(${(tint+120)%360},90%,65%,${0.4*alpha*3})`); cg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,26,0,Math.PI*2); ctx.fill();

    }

    // torches with flicker
    if(!S.torches){ S.torches=[]; for(let i=0;i<5;i++) S.torches.push({bx:i*0.22+0.08}); }
    for(let i=0;i<S.torches.length;i++){
      const tx=((S.torches[i].bx*W - S.scroll*0.35)%(W+120)+(W+120))%(W+120)-60, ty=H*0.42;
      const fl=0.6+0.4*Math.sin(now*0.02+i*2)+beatFlash*0.3;
      const g=ctx.createRadialGradient(tx,ty,0,tx,ty,70*fl);
      g.addColorStop(0,`hsla(30,100%,62%,${0.5*fl})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(tx,ty,70*fl,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsl(${25+fl*15},100%,60%)`; ctx.beginPath(); ctx.ellipse(tx,ty,6,12*fl,0,0,Math.PI*2); ctx.fill();
      if(Math.random()<0.3) retroSpark(tx,ty,30,1,{dir:-Math.PI/2,spread:0.5,speed:1.2,g:-0.04,dl:0.04,sz:2});
    }

    // ground
    ctx.fillStyle=`hsl(${(h+260)%360},40%,10%)`; ctx.fillRect(0,groundY,W,H-groundY);
    const goff=S.scroll%50; for(let x=-goff;x<W;x+=50){ ctx.strokeStyle='rgba(255,200,120,0.08)'; ctx.strokeRect(x,groundY,50,H-groundY); }

    // bats fluttering
    if(!S.bats){ S.bats=[]; for(let i=0;i<6;i++) S.bats.push({x:Math.random()*W,y:H*(0.2+Math.random()*0.3),f:Math.random()*6,sp:0.5+Math.random()}); }
    for(const b of S.bats){ b.x-=speed*b.sp*0.5; b.f+=0.35; b.y+=Math.sin(b.f*0.5)*1.2; if(b.x<-20){b.x=W+20;b.y=H*(0.15+Math.random()*0.35);} const w=Math.abs(Math.sin(b.f))*7+2; ctx.fillStyle='rgba(20,10,30,0.85)'; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-9,b.y-w); ctx.lineTo(b.x-4,b.y); ctx.lineTo(b.x,b.y+2); ctx.lineTo(b.x+4,b.y); ctx.lineTo(b.x+9,b.y-w); ctx.closePath(); ctx.fill(); }

    // hero
    S.run+=0.16+overall*0.004+beatFlash*0.2;
    const hx=W*0.26, feetY=groundY;
    const slashing = beatFlash>0.42;
    const hand = drawPixelHero(hx, feetY, { scale:3.2, phase:S.run, faceRight:true,
      skin:'#e8b98a', shirt:'#2e7d46', pants:'#5a3a24', accent:'#c8a24a', boot:'#3a2410', hat:'#8a5a2a',
      weapon:'sword', bladeLen: (slashing?16:12)*3.2*0.34, bladeHue:(h+60)%360,
      aim: slashing? (-Math.PI*0.5 - Math.sin(Math.min(1,beatFlash)*Math.PI)*1.4) : (-Math.PI*0.4+Math.sin(S.run)*0.3) });

    // spawn slash arcs on beat
    if(slashing && Math.random()<0.7){ S.slashes.push({x:hand.x, y:hand.y, ang:-0.5+Math.random()*0.5, life:1, hue:(h+60+Math.random()*40)%360, r:20}); retroSpark(hand.x,hand.y,(h+60)%360,6,{speed:4,sz:3}); }
    for(let i=S.slashes.length-1;i>=0;i--){ const s=S.slashes[i]; s.r+=14; s.life-=0.08;
      if(s.life<=0){ S.slashes.splice(i,1); continue; }
      ctx.strokeStyle=`hsla(${s.hue},95%,72%,${s.life})`; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, s.ang-0.9, s.ang+0.9); ctx.stroke();
      ctx.strokeStyle=`hsla(${s.hue},100%,90%,${s.life*0.6})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(s.x,s.y,s.r+4,s.ang-0.8,s.ang+0.8); ctx.stroke();
    }

    // crystal beasts approach, shatter on slash
    S.spawnT++; if(S.spawnT>Math.max(30,85-overall*0.4) && S.monsters.length<4){ S.spawnT=0; S.monsters.push({x:W+30, y:groundY-18, dead:0, hue:(h+200+Math.random()*100)%360, bob:Math.random()*6}); }
    for(let i=S.monsters.length-1;i>=0;i--){ const m=S.monsters[i];
      if(m.dead===0){ m.x-=speed*0.7; m.bob+=0.1; const by=Math.sin(m.bob)*4;

        ctx.fillStyle=`hsla(${m.hue},80%,55%,0.9)`; ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(13,0); ctx.lineTo(6,14); ctx.lineTo(-6,14); ctx.lineTo(-13,0); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#fff'; ctx.fillRect(-6,-6,4,4); ctx.fillRect(3,-6,4,4);
        ctx.restore();
        if(m.x<hx+120 && S.slashes.length>0){ m.dead=0.01; retroSpark(m.x,m.y,m.hue,22,{speed:6,sz:4,shape:'sq'}); retroKick(5); }
      } else { m.dead+=0.12; if(m.dead>1) S.monsters.splice(i,1); }
      if(m.x<-30) S.monsters.splice(i,1);

    retroEndScene();

  // ============================================================
  // Robot Hero — neon corridor, rainbow blaster fire, drones exploding in sparks.
  // ============================================================
  let robotS = { scroll:0, run:0, shots:[], drones:[], stars:null, spawnT:0, jet:0 };
  function drawRobotHero(bass,mid,treble,overall){
    const S=robotS, now=performance.now();
    retroBeginScene(bass,mid,treble,overall);
    const h=hueBase%360, groundY=H*0.8;
    const speed=3+overall*0.03+beatFlash*4; S.scroll+=speed;

    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,`hsl(${(h+230)%360},60%,10%)`); bg.addColorStop(1,`hsl(${(h+250)%360},70%,5%)`);
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // starfield
    if(!S.stars){ S.stars=[]; for(let i=0;i<90;i++) S.stars.push({x:Math.random()*W,y:Math.random()*H*0.75,z:0.3+Math.random()}); }
    for(const s of S.stars){ s.x-=speed*s.z*0.6; if(s.x<0){s.x=W;s.y=Math.random()*H*0.75;} ctx.fillStyle=`hsla(${(h+s.z*80)%360},80%,${60+s.z*20}%,${0.4+s.z*0.5})`; ctx.fillRect(s.x,s.y,2*s.z,2*s.z); }

    // neon circuit walls (top+bottom parallax)
    for(let layer=0;layer<2;layer++){
      const sp=0.4+layer*0.5, span=140, off=((S.scroll*sp)%span);
      for(let x=-off;x<W+span;x+=span){
        const tint=(h+layer*40+x*0.3)%360;
        ctx.strokeStyle=`hsla(${tint},90%,60%,${0.25+layer*0.2})`; ctx.lineWidth=2;
        ctx.strokeRect(x, H*0.06+layer*20, span-20, H*0.12);
        ctx.beginPath(); ctx.moveTo(x, H*0.06+layer*20+H*0.12); ctx.lineTo(x+span*0.4, H*0.24); ctx.stroke();
      }
    }

    // conveyor floor
    ctx.fillStyle=`hsl(${(h+220)%360},40%,14%)`; ctx.fillRect(0,groundY,W,H-groundY);
    const goff=S.scroll%46; for(let x=-goff;x<W;x+=46){ ctx.fillStyle=`hsla(${(h+180)%360},90%,55%,0.5)`; ctx.fillRect(x,groundY,22,5); ctx.strokeStyle='rgba(120,200,255,0.15)'; ctx.strokeRect(x,groundY,46,H-groundY); }

    // hero + jetpack flame
    S.run+=0.2+overall*0.004+beatFlash*0.3;
    const hx=W*0.24, feetY=groundY;
    S.jet=Math.max(S.jet*0.9, beatFlash);
    ctx.save(); ctx.translate(hx-14,feetY-14);
    const flame=14+S.jet*26+Math.sin(now*0.05)*4;
    const fg=ctx.createLinearGradient(0,0,-flame,0); fg.addColorStop(0,`hsl(${(h+30)%360},100%,70%)`); fg.addColorStop(1,'rgba(255,120,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-flame,0); ctx.lineTo(0,6); ctx.closePath(); ctx.fill();
    ctx.restore();

    const firing=beatFlash>0.45;
    const hand=drawPixelHero(hx, feetY, { scale:3.3, phase:S.run, faceRight:true,
      skin:'#c9d3e6', shirt:'#2f7ee0', pants:'#1a3f88', accent:'#8fe0ff', boot:'#123', hat:'#2f7ee0',
      weapon:'cannon', aim: firing? -Math.PI*0.5 : (-Math.PI*0.42+Math.sin(S.run)*0.2) });

    if(firing && Math.random()<0.75){ S.shots.push({x:hand.x, y:hand.y, hue:(h+Math.random()*140)%360, r:6+bass*0.05}); retroSpark(hand.x,hand.y,(h+40)%360,7,{dir:0,spread:1.2,speed:4,sz:3}); retroKick(3); }
    for(let i=S.shots.length-1;i>=0;i--){ const s=S.shots[i]; s.x+=16;
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2); g.addColorStop(0,`hsla(${s.hue},100%,75%,0.95)`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`hsla(${s.hue},100%,88%,0.95)`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.6,0,Math.PI*2); ctx.fill();
      if(s.x>W) S.shots.splice(i,1);
    }

    // drones fly in on sine paths, explode when hit
    S.spawnT++; if(S.spawnT>Math.max(24,80-overall*0.4) && S.drones.length<6){ S.spawnT=0; S.drones.push({x:W+30, y0:H*(0.25+Math.random()*0.4), amp:20+Math.random()*40, ph:Math.random()*6, dead:0, hue:(h+180+Math.random()*120)%360}); }
    for(let i=S.drones.length-1;i>=0;i--){ const d=S.drones[i];
      if(d.dead===0){ d.x-=speed*0.9; d.ph+=0.08; const y=d.y0+Math.sin(d.ph)*d.amp;
        ctx.save(); ctx.translate(d.x,y); ctx.rotate(Math.sin(now*0.01)*0.2);
        ctx.fillStyle=`hsl(${d.hue},70%,50%)`; ctx.fillRect(-11,-8,22,16);
        ctx.fillStyle=`hsl(${d.hue},90%,72%)`; ctx.beginPath(); ctx.arc(0,0,4+beatFlash*3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=`hsl(${d.hue},60%,40%)`; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-11,-8); ctx.lineTo(-16,-14); ctx.moveTo(11,-8); ctx.lineTo(16,-14); ctx.stroke();
        ctx.restore();
        for(const s of S.shots){ if(Math.abs(s.x-d.x)<16 && Math.abs(s.y-y)<14){ d.dead=0.01; retroSpark(d.x,y,d.hue,26,{speed:6,sz:4}); retroKick(6); } }
      } else { d.dead+=0.12; if(d.dead>1) S.drones.splice(i,1); }
      if(d.x<-30) S.drones.splice(i,1);
    }

    retroEndScene();
  }

  // ============================================================
  // Boxer Knockout — arena lights, bobbing fighters, KO star-burst + confetti.
  // ============================================================
  let boxS = { oppHit:0, pl:0, opp:0, crowd:null, confetti:[], jab:0 };
  function drawBoxerKO(bass,mid,treble,overall){
    const S=boxS, now=performance.now();
    retroBeginScene(bass,mid,treble,overall);
    const h=hueBase%360;

    const bg=ctx.createRadialGradient(W/2,H*0.45,40,W/2,H*0.5,W*0.75);
    bg.addColorStop(0,`hsl(${(h+20)%360},45%,22%)`); bg.addColorStop(1,`hsl(${(h+10)%360},50%,6%)`);
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // sweeping spotlights
    for(let i=0;i<3;i++){ const a=Math.sin(now*0.0006+i*2)*0.5; const lx=W*(0.25+i*0.25);
      ctx.save(); ctx.translate(lx,0); ctx.rotate(a);
      const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,`hsla(${(h+i*60)%360},90%,70%,${0.14+beatFlash*0.15})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-120,H); ctx.lineTo(120,H); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    // cheering crowd (dots that bounce on beat)
    if(!S.crowd){ S.crowd=[]; for(let i=0;i<160;i++) S.crowd.push({x:Math.random()*W,y:H*(0.05+Math.random()*0.28),ph:Math.random()*6,hue:Math.random()*360}); }
    for(const c of S.crowd){ const bounce=Math.sin(now*0.004+c.ph)*3 + beatFlash*8; ctx.fillStyle=`hsl(${(c.hue+hueBase*0.2)%360},60%,${45+beatFlash*25}%)`; ctx.beginPath(); ctx.arc(c.x,c.y-bounce,3,0,Math.PI*2); ctx.fill(); }

    // ring
    const ringY=H*0.86, ringTop=H*0.5;
    ctx.fillStyle=`hsl(${(h+15)%360},35%,${18}%)`; ctx.fillRect(0,ringY,W,H-ringY);
    ctx.fillStyle=`hsl(${(h+15)%360},40%,26%)`; ctx.fillRect(0,ringY,W,10);
    for(let r=0;r<3;r++){ const y=ringTop+r*26; ctx.strokeStyle=`hsl(${(h+r*40)%360},80%,60%)`; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    for(const px of [30,W-30]){ ctx.fillStyle='#c9c9c9'; ctx.fillRect(px-5,ringTop-10,10,ringY-ringTop+14); }

    // bob & jab timing
    S.pl+=0.14+overall*0.004; S.opp+=0.13;
    const jab = beatFlash>0.5 ? Math.sin(Math.min(1,beatFlash*1.4)*Math.PI) : 0;
    S.oppHit=Math.max(0,S.oppHit-0.03);
    const ko = beatFlash>0.85;
    if(ko){ S.oppHit=1; retroKick(10);
      for(let i=0;i<3;i++) S.confetti.push({x:W*0.68,y:ringY-90,vx:(Math.random()-0.5)*7,vy:-(4+Math.random()*7),hue:Math.random()*360,life:1});
    }

    // player (left) — bobbing, jab on beat
    const plX=W*0.32, plY=ringY - Math.abs(Math.sin(S.pl))*4;
    drawPixelHero(plX, plY, { scale:3.6, phase:S.pl*0.5, grounded:true, faceRight:true,
      skin:'#e8b98a', shirt:'#d0432a', pants:'#7a1818', accent:'#f2c020', boot:'#3a2410', hat:'#d0432a',
      weapon:'fist', aim: -Math.PI*0.5 - jab*0.6 });
    // glove reach
    ctx.fillStyle='#e63a2e'; ctx.beginPath(); ctx.arc(plX+30+jab*46, plY-42, 11+jab*4,0,Math.PI*2); ctx.fill();

    // opponent (right) — recoils on hit
    const ox=W*0.66+S.oppHit*46, oy=ringY - Math.abs(Math.sin(S.opp))*4 - S.oppHit*18;
    ctx.save(); ctx.translate(ox,oy); ctx.rotate(S.oppHit*0.5);
    drawPixelHero(0, 0, { scale:3.6, phase:S.opp*0.5, grounded:true, faceRight:false,
      skin:'#d8a878', shirt:'#3050c0', pants:'#1a2f7a', accent:'#8fe0ff', boot:'#123', hat:'#3050c0',
      weapon:'fist', aim: -Math.PI*0.5 });
    ctx.restore();

    if(jab>0.4) retroSpark(plX+70, plY-42, (h+30)%360, 4, {speed:3,sz:3});
    if(S.oppHit>0.6){ retroSpark(ox, oy-40, 50, 3, {speed:4,sz:4,shape:'sq'});
      // KO stars
      ctx.strokeStyle=`hsla(50,100%,75%,${S.oppHit})`; ctx.lineWidth=2;
      for(let i=0;i<5;i++){ const a=now*0.005+i*1.25; ctx.save(); ctx.translate(ox,oy-70); ctx.rotate(a); drawStar(0,0,3,10,5); ctx.stroke(); ctx.restore(); }
    }
    // confetti
    for(let i=S.confetti.length-1;i>=0;i--){ const c=S.confetti[i]; c.x+=c.vx; c.y+=c.vy; c.vy+=0.3; c.life-=0.012;
      if(c.life<=0||c.y>H){ S.confetti.splice(i,1); continue; }
      ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.x*0.1); ctx.fillStyle=`hsl(${c.hue},90%,60%)`; ctx.fillRect(-3,-3,6,6); ctx.restore();
    }
    function drawStar(cx,cy,r1,r2,pts){ ctx.beginPath(); for(let i=0;i<pts*2;i++){ const rr=i%2?r1:r2, a=Math.PI*i/pts; ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);} ctx.closePath(); }

    retroEndScene();
  }

  // ============================================================

    const goff=S.scroll%36; for(let x=-goff;x<W;x+=36){ ctx.fillStyle=`hsl(${(h+95)%360},60%,32%)`; ctx.fillRect(x,groundY,18,6); }

    // hero
    S.run+=0.24+overall*0.005+beatFlash*0.3;
    const hx=W*0.24, feetY=groundY;
    const firing=beatFlash>0.28; S.muzzle=Math.max(S.muzzle*0.7, firing?1:0);
    const hand=drawPixelHero(hx, feetY, { scale:3.2, phase:S.run, faceRight:true,
      skin:'#e0b080', shirt:'#4a5a30', pants:'#33401f', accent:'#c9b070', boot:'#2a2214', hat:'#5a6a3a',
      weapon:'gun', aim: firing? -Math.PI*0.5 : (-Math.PI*0.42+Math.sin(S.run)*0.2) });

  // ============================================================
  // Whip Hunter — gothic castle, animated multi-segment whip crack, shattering statues.

  let whipS = { scroll:0, run:0, whip:0, monsters:[], candles:null, moonPh:0, spawnT:0 };
  function drawWhipHunter(bass,mid,treble,overall){
    const S=whipS, now=performance.now();

    const h=hueBase%360, groundY=H*0.82;
    const speed=2.2+overall*0.026+beatFlash*3; S.scroll+=speed;

    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // moon
    const mx=W*0.78, my=H*0.2, mr=48+beatFlash*10;

    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,mr*2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`hsl(${(h+55)%360},40%,88%)`; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`hsl(${(h+50)%360},35%,78%)`; ctx.beginPath(); ctx.arc(mx-14,my-8,7,0,Math.PI*2); ctx.arc(mx+10,my+6,5,0,Math.PI*2); ctx.fill();

    // parallax castle silhouettes with lit windows
    for(let layer=0;layer<2;layer++){
      const sp=0.3+layer*0.45, span=220, off=((S.scroll*sp)%span);
      for(let x=-off;x<W+span;x+=span){ const topY=H*(0.4+layer*0.12);

    for(const c of S.candles){ const cx=((c.bx*W - S.scroll*0.5)%(W+80)+(W+80))%(W+80)-40; const fl=0.6+0.4*Math.sin(now*0.02+cx); const g=ctx.createRadialGradient(cx,c.y,0,cx,c.y,40*fl); g.addColorStop(0,`hsla(38,100%,62%,${0.4*fl})`); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,c.y,40*fl,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#ffb347'; ctx.beginPath(); ctx.ellipse(cx,c.y,3,7*fl,0,0,Math.PI*2); ctx.fill(); }

    const goff=S.scroll%48; for(let x=-goff;x<W;x+=48){ ctx.strokeStyle='rgba(180,160,255,0.06)'; ctx.strokeRect(x,groundY,48,H-groundY);}

    S.run+=0.15+overall*0.004+beatFlash*0.2;
    const hx=W*0.26, feetY=groundY;

      for(let i=1;i<=segs;i++){ const t=i/segs; const nx=hand.x+t*reach; const ny=hand.y + Math.sin(t*3 + now*0.03 - S.whip*4)*26*t*S.whip;
        ctx.strokeStyle=`hsla(${(h+40+t*60)%360},95%,${70}%,${S.whip*(1-t*0.3)})`; ctx.lineWidth=3.2*(1-t*0.6);

  // ============================================================
  // Bounty Hunter — alien cavern, arm-cannon charge ring, huge beam blast on full charge.
  // ============================================================
  let bountyS = { scroll:0, run:0, charge:0, beams:[], motes:null, spawnT:0, aliens:[], flash:0 };
  function drawBountyHunter(bass,mid,treble,overall){
    const S=bountyS, now=performance.now();
    retroBeginScene(bass,mid,treble,overall);
    const h=hueBase%360, groundY=H*0.8;
    const speed=2.6+overall*0.028+beatFlash*3.5; S.scroll+=speed;

    const bg=ctx.createRadialGradient(W*0.5,H*0.55,30,W*0.5,H*0.55,W*0.8);
    bg.addColorStop(0,`hsl(${(h+150)%360},55%,16%)`); bg.addColorStop(1,`hsl(${(h+170)%360},60%,5%)`);

    const pg=ctx.createRadialGradient(px-14,py-14,4,px,py,pr); pg.addColorStop(0,`hsl(${(h+40)%360},70%,60%)`); pg.addColorStop(1,`hsl(${(h+20)%360},70%,28%)`);
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();

    for(const m of S.motes){ m.x-=speed*m.z*0.4; m.ph+=0.03; if(m.x<0){m.x=W;m.y=Math.random()*H;} ctx.fillStyle=`hsla(${(h+140+m.z*80)%360},85%,65%,${0.3+0.3*Math.sin(m.ph)})`; ctx.beginPath(); ctx.arc(m.x,m.y,2*m.z+1,0,Math.PI*2); ctx.fill(); }

    // glowing stalactites/stalagmites parallax
    for(let layer=0;layer<2;layer++){
      const sp=0.35+layer*0.5, span=170, off=((S.scroll*sp)%span);
      for(let x=-off;x<W+span;x+=span){ const tint=(h+140+layer*30)%360;
        ctx.fillStyle=`hsla(${tint},60%,${14+layer*8}%,${0.6+layer*0.2})`;
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+30,H*0.28+layer*20); ctx.lineTo(x+60,0); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x+span*0.5,groundY); ctx.lineTo(x+span*0.5+26,groundY-H*0.22-layer*16); ctx.lineTo(x+span*0.5+52,groundY); ctx.closePath(); ctx.fill();

    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(hand.x,hand.y,cr,0,Math.PI*2); ctx.fill();
    if(S.charge>=1 || (beatFlash>0.85 && S.charge>0.5)){ S.beams.push({x:hand.x,y:hand.y,r:cr,hue:(h+140)%360,grow:1}); S.charge=0; S.flash=1; retroKick(12); retroSpark(hand.x,hand.y,(h+150)%360,24,{dir:0,spread:1.4,speed:7,sz:5}); }
    S.flash*=0.85;

    for(let i=S.beams.length-1;i>=0;i--){ const b=S.beams[i]; b.x+=24; b.grow=Math.min(3,b.grow+0.15);

      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,rr*2); g.addColorStop(0,`hsla(${b.hue},100%,80%,0.95)`); g.addColorStop(0.5,`hsla(${b.hue},95%,60%,0.5)`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,rr*2,0,Math.PI*2); ctx.fill();

        ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-4,-3,1.5,0,Math.PI*2); ctx.arc(4,-3,1.5,0,Math.PI*2); ctx.fill();

  // --- Phoenix Rebirth: a firebird shape rendered in glowing embers, wings breathing with the beat ---
  let phoenixState = { emberParticles: [] };
  function drawPhoenixRebirth(bass,mid,treble,overall){
    if(!phoenixState.phase) phoenixState.phase = 0;
    phoenixState.phase += 0.01+overall*0.0003;
    const cx=W/2, cy=H*0.5;
    const wingSpread = 0.6+0.4*Math.sin(phoenixState.phase*2)+beatFlash*0.3;
    const size = Math.min(W,H)*0.32;
    ctx.save(); ctx.translate(cx,cy);
    const bodyGrad = ctx.createRadialGradient(0,0,0,0,0,size*0.5);
    bodyGrad.addColorStop(0,`hsla(${(hueBase+20)%360},95%,65%,0.8)`);
    bodyGrad.addColorStop(1,`hsla(${(hueBase+20)%360},95%,45%,0)`);
    ctx.fillStyle=bodyGrad;
    ctx.beginPath(); ctx.ellipse(0,0,size*0.18,size*0.4,0,0,Math.PI*2); ctx.fill();
    for(const side of [-1,1]){
      ctx.save(); ctx.scale(side,1);
      ctx.beginPath();
      ctx.moveTo(0,-size*0.1);
      ctx.quadraticCurveTo(size*0.5*wingSpread, -size*0.5, size*0.9*wingSpread, -size*0.15);
      ctx.quadraticCurveTo(size*0.5*wingSpread, size*0.05, size*0.15, size*0.15);
      ctx.closePath();
      const wGrad = ctx.createLinearGradient(0,0,size*0.9,0);
      wGrad.addColorStop(0, `hsla(${hueBase%360},95%,55%,0.6)`);
      wGrad.addColorStop(1, `hsla(${(hueBase+50)%360},95%,60%,0.1)`);
      ctx.fillStyle=wGrad; ctx.fill();
      ctx.restore();
    }
    ctx.restore();
    if(Math.random()<0.6+beatFlash*2){
      phoenixState.emberParticles.push({ x:cx+(Math.random()-0.5)*size, y:cy+(Math.random()-0.5)*size, vy:-(0.5+Math.random()), life:1, hue:hueBase+Math.random()*40 });
    }
    for(let i=phoenixState.emberParticles.length-1;i>=0;i--){
      const p=phoenixState.emberParticles[i];
      p.y+=p.vy; p.life-=0.015;
      if(p.life<=0){ phoenixState.emberParticles.splice(i,1); continue; }
      ctx.fillStyle=`hsla(${p.hue%360},95%,60%,${p.life})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,2+beatFlash*2,0,Math.PI*2); ctx.fill();
    }
    if(phoenixState.emberParticles.length>200) phoenixState.emberParticles.splice(0,phoenixState.emberParticles.length-200);
  }

  // --- Dragon Breath: a long serpentine body coils across the screen, breathing fire on the beat ---
  let dragonT = 0;
  function drawDragonBreath(bass,mid,treble,overall){
    dragonT += 0.02+overall*0.0004;
    const segs=16;
    const headX=W*0.25, headY=H*0.4+Math.sin(dragonT)*40;
    ctx.beginPath();
    for(let i=0;i<segs;i++){
      const t=i/segs;
      const x = headX + t*W*0.55;
      const y = headY + Math.sin(dragonT*1.5 - t*4)*60;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    const hue=(hueBase+100)%360;
    ctx.strokeStyle=`hsla(${hue},70%,45%,0.7)`;
    ctx.lineWidth=22-treble*0.02;
    ctx.lineCap='round';
    ctx.stroke();
    ctx.fillStyle=`hsla(${hue},70%,40%,0.9)`;
    ctx.beginPath(); ctx.arc(headX,headY,18,0,Math.PI*2); ctx.fill();
    const breathLen = 120+bass*1.2+beatFlash*100;
    const bgrad = ctx.createLinearGradient(headX-30,headY,headX-30-breathLen,headY);
    bgrad.addColorStop(0,'hsla(40,100%,60%,0.8)');
    bgrad.addColorStop(1,'hsla(10,100%,50%,0)');
    ctx.fillStyle=bgrad;
    ctx.beginPath();
    ctx.moveTo(headX-16,headY-14);
    ctx.lineTo(headX-16-breathLen, headY-40-Math.sin(dragonT*3)*20);
    ctx.lineTo(headX-16-breathLen, headY+40+Math.sin(dragonT*3)*20);
    ctx.lineTo(headX-16,headY+14);
    ctx.closePath(); ctx.fill();
  }

  // --- Thunder Storm: branching lightning cracks across a churning storm sky ---
  function drawThunderStorm(bass,mid,treble,overall){
    const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,'#0a0a14'); grad.addColorStop(1,'#141420');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    for(let i=0;i<6;i++){
      const cx=(i*W/6+performance.now()*0.005)%W, cy=H*0.15+Math.sin(i)*20;
      ctx.fillStyle='rgba(60,60,80,0.3)';
      ctx.beginPath(); ctx.ellipse(cx,cy,90,30,0,0,Math.PI*2); ctx.fill();
    }
    if(beatFlash>0.6 || Math.random()<0.015+treble*0.0003){
      const x0=Math.random()*W;
      boltBranch(x0,H*0.15,x0+(Math.random()-0.5)*200,H,4);
    }
    function boltBranch(x0,y0,x1,y1,depth){

      ctx.strokeStyle=`hsla(220,100%,90%,${0.7+beatFlash*0.3})`;
      ctx.lineWidth=depth;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(midx,midy); ctx.lineTo(x1,y1); ctx.stroke();
      if(Math.random()<0.6) boltBranch(midx,midy, midx+(Math.random()-0.5)*120, midy+(Math.random()-0.5)*100, depth-1);
    }

      const x=(i*37+performance.now()*0.3)%W, y=(i*53+performance.now()*0.6)%H;

      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-4,y+14); ctx.stroke();

  // --- Crystal Titan: a colossal humanoid built from faceted translucent crystal shards ---
  function drawCrystalTitan(bass,mid,treble,overall){
    const cx=W/2, cy=H*0.55;

    const parts = [
      {dx:0,dy:-0.35,w:0.22,h:0.25}, {dx:0,dy:0.0,w:0.4,h:0.4},
      {dx:-0.28,dy:-0.05,w:0.16,h:0.3}, {dx:0.28,dy:-0.05,w:0.16,h:0.3},
      {dx:-0.14,dy:0.35,w:0.16,h:0.3}, {dx:0.14,dy:0.35,w:0.16,h:0.3}
    ];
    for(const p of parts){
      const x=cx+p.dx*scale, y=cy+p.dy*scale, w=p.w*scale, h=p.h*scale;
      ctx.save(); ctx.translate(x,y); ctx.rotate(Math.sin(performance.now()*0.0007+p.dx)*0.05);

  }

  // --- Portal Storm: multiple swirling portal rings scattered across the screen ---
  let portals = null;

  // --- Samurai Slash: a lone figure at the center, rapid glowing sword slashes radiating outward ---
  let slashState = { slashes: [] };
  function drawSamuraiSlash(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;

    for(let i=slashState.slashes.length-1;i>=0;i--){
      const s=slashState.slashes[i];

      if(s.life<=0){ slashState.slashes.splice(i,1); continue; }

  // --- Kraken Rising: writhing tentacles erupting from the depths, slamming down on big beats ---

      for(let i=1;i<=segs;i++){

  }

  // --- Celestial Choir: rows of glowing angelic forms pulsing in unison, radiant light from above ---
  function drawCelestialChoir(bass,mid,treble,overall){

        const x = W*((c+0.5)/cols), y=H*(0.3+r*0.18);

        ctx.save(); ctx.translate(x,y);

        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.fill();

        ctx.fillStyle=`hsla(${hue},70%,90%,0.15)`; ctx.fill();

      ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx+Math.cos(ang)*H*1.2, Math.sin(ang)*H*1.2+H*0.3); ctx.stroke();
    }

  // --- Volcanic Eruption: a volcano bursts with glowing embers arcing skyward ---

    const grad=ctx.createLinearGradient(0,0,0,H); grad.addColorStop(0,'#1a0808'); grad.addColorStop(1,'#000');

  // --- Titan Golem: floating boulder fragments assemble into a colossal figure, then scatter and repeat ---
  let golemFrags = null, golemAssembled = 0;
  function drawTitanGolem(bass,mid,treble,overall){
    if(!golemFrags){
      golemFrags=[];
      const parts=[{dx:0,dy:-0.3},{dx:0,dy:0},{dx:-0.25,dy:0},{dx:0.25,dy:0},{dx:-0.12,dy:0.3},{dx:0.12,dy:0.3}];
      for(const p of parts) golemFrags.push({ tx:p.dx, ty:p.dy, x:Math.random()*2-1, y:Math.random()*2-1, hue:Math.random()*40 });
    }
    golemAssembled = Math.min(1, golemAssembled + 0.003 + (beatFlash>0.6?0.05:0));
    const cx=W/2, cy=H*0.55, scale=Math.min(W,H)*0.4;
    for(const f of golemFrags){
      const x = cx + (f.x*(1-golemAssembled) + f.tx*golemAssembled)*scale;
      const y = cy + (f.y*(1-golemAssembled) + f.ty*golemAssembled)*scale;
      const hue=(20+f.hue)%360;
      ctx.fillStyle=`hsla(${hue},60%,35%,0.9)`;
      ctx.fillRect(x-20,y-20,40,40);
      ctx.strokeStyle=`hsla(50,90%,60%,${0.3+beatFlash*0.5})`;
      ctx.lineWidth=1.5; ctx.strokeRect(x-20,y-20,40,40);

      const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);

      ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(cx,cy,glowR,0,Math.PI*2); ctx.fill();
    }
    if(golemAssembled>=1 && Math.random()<0.003){
      golemAssembled=0;
      for(const f of golemFrags){ f.x=Math.random()*2-1; f.y=Math.random()*2-1; }
    }
  }

  // ============================================================
  // MilkDrop-inspired pack — 50 audio-reactive scenes.
  // Shared helpers: HSV->RGB + a reusable low-res pixel field buffer
  // for plasma / fractal / fluid scenes (kept small for performance,
  // then upscaled with smoothing so it reads as a full-screen field).
  // ============================================================
  function hsvToRgb(h,s,v){
    h=((h%360)+360)%360; const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c; let r,g,b;
    if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
    else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
    return [ (r+m)*255, (g+m)*255, (b+m)*255 ];
  }
  let _mdC=null,_mdX=null,_mdImg=null,_mdW=0,_mdH=0;
  function mdField(fw){
    const fh=Math.max(2,Math.round(fw*H/W));
    if(!_mdC){ _mdC=document.createElement('canvas'); _mdX=_mdC.getContext('2d'); }
    if(_mdW!==fw||_mdH!==fh){ _mdW=fw;_mdH=fh;_mdC.width=fw;_mdC.height=fh;_mdImg=_mdX.createImageData(fw,fh); }
    return _mdImg;
  }

  // 1. Oscilloscope — classic layered waveform trace
  function drawOscilloscope(bass,mid,treble,overall){
    const cy=H/2, n=timeData.length;
    for(let layer=0;layer<3;layer++){
      ctx.beginPath();
      for(let i=0;i<n;i+=2){ const x=i/n*W; const v=(timeData[i]-128)/128; const y=cy+v*(H*0.3)*(1+layer*0.35)+Math.sin(i*0.02+layer)*4; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
      ctx.strokeStyle=`hsla(${(hueBase+layer*55)%360},95%,63%,${0.85-layer*0.24})`; ctx.lineWidth=3-layer; ctx.stroke();
    }
  }
  // 2. Radial Scope — waveform wrapped into a ring
  function drawRadialScope(bass,mid,treble,overall){
    const cx=W/2,cy=H/2,n=timeData.length,base=Math.min(W,H)*0.2;
    for(let layer=0;layer<2;layer++){
      ctx.beginPath();
      for(let i=0;i<=n;i++){ const t=(i%n)/n; const a=t*Math.PI*2+rotation; const v=(timeData[i%n]-128)/128; const r=base+v*base*0.95*(1+layer*0.45)+beatFlash*30; const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
      ctx.closePath(); ctx.strokeStyle=`hsla(${(hueBase+layer*60)%360},95%,66%,${0.85-layer*0.35})`; ctx.lineWidth=2.5; ctx.stroke();
    }
  }
  // 3. Lissajous
  let lissT=0;
  function drawLissajous(bass,mid,treble,overall){
    lissT+=0.01+treble*0.0003; const cx=W/2,cy=H/2,R=Math.min(W,H)*0.4;
    const a=2+(Math.floor(mid*0.02)%4), b=3+(Math.floor(treble*0.02)%5);
    ctx.beginPath();
    for(let i=0;i<=420;i++){ const t=i/420*Math.PI*2; const x=cx+Math.sin(a*t+lissT)*R*(0.8+beatFlash*0.2); const y=cy+Math.sin(b*t)*R; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
    ctx.strokeStyle=`hsla(${hueBase%360},95%,66%,0.75)`; ctx.lineWidth=2+bass*0.02; ctx.stroke();
  }
  // 4. Harmonograph
  let harmT=0;
  function drawHarmonograph(bass,mid,treble,overall){
    harmT+=0.006+overall*0.0002; const cx=W/2,cy=H/2,R=Math.min(W,H)*0.34; ctx.beginPath();
    for(let i=0;i<=1200;i++){ const t=i*0.06; const damp=Math.exp(-0.002*t); const x=cx+(Math.sin(t*2+harmT)*damp+Math.sin(t*2.99)*damp)*R*0.5; const y=cy+(Math.sin(t*3.01+harmT*1.3)*damp+Math.sin(t*4.98)*damp)*R*0.5; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
    ctx.strokeStyle=`hsla(${(hueBase+40)%360},90%,66%,0.55)`; ctx.lineWidth=1.6; ctx.stroke();
  }
  // 5. Sine Field
  let sineT=0;
  function drawSineField(bass,mid,treble,overall){
    sineT+=0.02+treble*0.0004; const rows=14;
    for(let r=0;r<rows;r++){ const yb=H*(r+0.5)/rows; const amp=10+mid*0.6+beatFlash*30; ctx.beginPath();
      for(let x=0;x<=W;x+=6){ const y=yb+Math.sin(x*0.012+sineT*(1+r*0.1)+r)*amp*Math.sin(sineT*0.5+r); if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
      ctx.strokeStyle=`hsla(${(hueBase+r*24)%360},90%,62%,0.6)`; ctx.lineWidth=2; ctx.stroke(); }
  }
  // 6. Fourier Epicycles
  let epiT=0, epiPath=[];
  function drawEpicycles(bass,mid,treble,overall){
    epiT+=0.02+overall*0.0004; const cx=W/2,cy=H/2; let x=cx,y=cy; const N=7;
    ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.lineWidth=1;
    for(let k=0;k<N;k++){ const freq=(k*2+1); const rad=(Math.min(W,H)*0.19)/(k*2+1)*(1+(k===0?bass*0.004:treble*0.002)); const px=x,py=y; x+=Math.cos(freq*epiT)*rad; y+=Math.sin(freq*epiT)*rad; ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke(); }
    epiPath.push({x,y}); if(epiPath.length>240)epiPath.shift();
    ctx.beginPath(); for(let i=0;i<epiPath.length;i++){ const p=epiPath[i]; if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);} ctx.strokeStyle=`hsla(${hueBase%360},95%,66%,0.9)`; ctx.lineWidth=2.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x,y,3+beatFlash*3,0,Math.PI*2); ctx.fill();
  }
  // 7. Frequency Rose
  function drawFreqRose(bass,mid,treble,overall){
    const cx=W/2,cy=H/2,base=Math.min(W,H)*0.12,segs=Math.floor(freqData.length*0.5);
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotation);
    for(let mir=0;mir<2;mir++){ ctx.save(); if(mir)ctx.scale(-1,1); ctx.beginPath();
      for(let i=0;i<segs;i++){ const a=(i/segs)*Math.PI; const amp=freqData[i]/255; const r=base+amp*Math.min(W,H)*0.36+beatFlash*20; const x=Math.cos(a-Math.PI/2)*r,y=Math.sin(a-Math.PI/2)*r; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
      ctx.strokeStyle=`hsla(${hueBase%360},95%,64%,0.8)`; ctx.lineWidth=2; ctx.stroke();
      const g=ctx.createRadialGradient(0,0,base,0,0,Math.min(W,H)*0.4); g.addColorStop(0,`hsla(${hueBase%360},90%,60%,0.05)`); g.addColorStop(1,`hsla(${(hueBase+80)%360},90%,55%,0.16)`); ctx.fillStyle=g; ctx.fill(); ctx.restore();
    }
    ctx.restore();
  }
  // 8. Wave Terrain
  let terrT=0;
  function drawWaveTerrain(bass,mid,treble,overall){
    terrT+=0.02+overall*0.0004; const cx=W/2,horizon=H*0.42,rows=18,cols=24;
    function pt(gx,z){ const depth=z/rows; const persp=1/(0.2+depth*2.2); const wx=(gx-cols/2)/cols; const hgt=Math.sin(gx*0.6+z*0.5+terrT*2)*(20+mid*0.4)+Math.sin(gx*0.3-z*0.7)*(10+bass*0.2); return [cx+wx*W*1.4*persp, horizon+(H-horizon)*(1-persp)-hgt*persp]; }
    for(let z=rows-1;z>=0;z--){ ctx.beginPath(); const zz=z+(terrT%1); for(let gx=0;gx<=cols;gx++){ const p=pt(gx,zz); if(gx===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);} const hue=(hueBase+z*8)%360; ctx.strokeStyle=`hsla(${hue},90%,${45+(rows-z)/rows*25}%,${0.3+(rows-z)/rows*0.5})`; ctx.lineWidth=1.5; ctx.stroke(); }
  }
  // 9. Plasma Tunnel
  let ptT=0;
  function drawPlasmaTunnel(bass,mid,treble,overall){
    ptT+=0.02+treble*0.0005; const img=mdField(150),d=img.data,fw=_mdW,fh=_mdH,cx=fw/2,cy=fh/2; const zoom=ptT+beatFlash*0.5;
    for(let y=0;y<fh;y++)for(let x=0;x<fw;x++){ const dx=x-cx,dy=y-cy; const r=Math.sqrt(dx*dx+dy*dy)+0.001; const a=Math.atan2(dy,dx); const u=1/r*8+zoom; const v=a*3/Math.PI; const val=Math.sin(u*3)+Math.sin(v*4+ptT*2)+Math.sin((u+v)*2); const hue=(hueBase+val*60+r*2)%360; const rgb=hsvToRgb(hue,0.85,Math.min(1,0.35+(0.5+0.5*val)*0.6)); const idx=(y*fw+x)*4; d[idx]=rgb[0];d[idx+1]=rgb[1];d[idx+2]=rgb[2];d[idx+3]=255; }
    mdBlit();
  }
  // 10. Checker Tunnel
  let ctT=0;
