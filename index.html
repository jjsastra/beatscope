<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BEATSCOPE — audio reactive visualizer</title>
<style>
  :root{
    --hud-fg: rgba(255,255,255,0.88);
    --hud-fg-dim: rgba(255,255,255,0.42);
    --hud-bg: rgba(8,8,12,0.55);
    --hud-border: rgba(255,255,255,0.10);
    --accent: #7CFFCB;
    --mono: "JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#000; font-family:var(--mono);
    -webkit-user-select:none; user-select:none;
    touch-action:none;
  }
  canvas{display:block; position:fixed; inset:0; width:100%; height:100%;}

  #startScreen{
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 40%, #0c1210 0%, #000 75%);
    color:var(--hud-fg); text-align:center; padding:24px;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #startScreen.hidden{opacity:0; visibility:hidden; pointer-events:none;}

  .wordmark{
    font-size:clamp(34px, 9vw, 64px);
    letter-spacing:0.14em;
    font-weight:700;
    color:#fff;
    margin:0;
    line-height:1;
  }
  .wordmark span{color:var(--accent);}
  .tagline{
    color:var(--hud-fg-dim);
    font-size:13px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    margin:10px 0 40px;
  }

  .srcRow{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; max-width:480px;}
  .srcBtn{
    font-family:var(--mono);
    background:transparent;
    border:1px solid rgba(255,255,255,0.22);
    color:var(--hud-fg);
    padding:16px 22px;
    border-radius:2px;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    min-width:190px;
    transition: border-color .2s, background .2s, transform .1s;
  }
  .srcBtn:active{transform:scale(0.97);}
  .srcBtn:hover{border-color:var(--accent); background:rgba(124,255,203,0.06);}
  .srcBtn small{display:block; margin-top:4px; color:var(--hud-fg-dim); font-size:10px; letter-spacing:0.05em; text-transform:none;}

  #fileInput{display:none;}

  #statusLine{
    margin-top:28px; font-size:11px; color:var(--hud-fg-dim);
    letter-spacing:0.05em; min-height:16px;
  }

  /* HUD overlay while running */
  #hud{
    position:fixed; inset:0; z-index:20; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
    padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    opacity:1; transition:opacity .5s ease;
  }
  #hud.dim{opacity:0;}

  .hudTop, .hudBottom{
    display:flex; justify-content:space-between; align-items:center; pointer-events:auto;
  }
  .badge{
    font-size:11px; letter-spacing:0.16em; color:var(--hud-fg-dim);
    background:var(--hud-bg); border:1px solid var(--hud-border);
    padding:8px 12px; border-radius:2px; backdrop-filter: blur(6px);
  }
  .badge b{color:var(--accent); font-weight:600;}

  .controls{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    background:var(--hud-bg); border:1px solid var(--hud-border);
    padding:8px; border-radius:6px; backdrop-filter: blur(8px);
  }
  .ctlBtn{
    font-family:var(--mono); background:transparent; border:1px solid var(--hud-border);
    color:var(--hud-fg); padding:12px 14px; border-radius:4px; font-size:12px;
    letter-spacing:0.06em; cursor:pointer; min-width:44px; min-height:44px;
  }
  .ctlBtn.active{border-color:var(--accent); color:var(--accent);}
  .ctlBtn:active{transform:scale(0.95);}

  #sensWrap{display:flex; align-items:center; gap:8px; padding:0 6px;}
  #sensWrap label{font-size:10px; color:var(--hud-fg-dim); letter-spacing:0.08em;}
  #sens{width:90px; accent-color:var(--accent);}

  #modeLabel{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:15; pointer-events:none;
    font-size:13px; letter-spacing:0.3em; text-transform:uppercase;
    color:rgba(255,255,255,0.85);
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    opacity:0; transition:opacity .25s ease;
  }
  #modeLabel.show{opacity:1;}

  @media (max-width: 480px){
    .srcBtn{min-width:150px; padding:14px 16px;}
    .badge{font-size:10px; padding:6px 9px;}
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="modeLabel"></div>

<div id="hud">
  <div class="hudTop">
    <div class="badge" id="srcBadge">MIC</div>
    <div class="badge" id="bpmBadge">-- <span style="color:var(--hud-fg-dim)">bpm</span></div>
  </div>
  <div class="hudBottom">
    <div class="controls">
      <button class="ctlBtn" id="modeBtn" title="Next visual">MODE ▸</button>
      <button class="ctlBtn" id="autoBtn" title="Auto-cycle modes">AUTO</button>
      <div id="sensWrap">
        <label>SENS</label>
        <input type="range" id="sens" min="0.5" max="2.5" step="0.05" value="1.2">
      </div>
      <button class="ctlBtn" id="fsBtn" title="Fullscreen">⛶</button>
    </div>
  </div>
</div>

<div id="startScreen">
  <h1 class="wordmark">BEAT<span>SCOPE</span></h1>
  <p class="tagline">audio reactive visuals · works on phone & car browsers</p>
  <div class="srcRow">
    <button class="srcBtn" id="micBtn">Listen with mic<small>reacts to whatever's playing in the room / cabin</small></button>
    <button class="srcBtn" id="fileBtn">Play an audio file<small>choose a track from this device</small></button>
  </div>
  <input type="file" id="fileInput" accept="audio/*">
  <div id="statusLine">tip: on a Tesla, open this page in the car's browser and allow microphone access</div>
</div>

<script>
(function(){
  "use strict";

  // ---------- canvas setup ----------
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d', { alpha:false });
  let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1, 2);

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- audio ----------
  let audioCtx, analyser, sourceNode, audioEl;
  let freqData, timeData;
  const FFT_SIZE = 1024;

  function ensureAudioCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = FFT_SIZE;
      analyser.smoothingTimeConstant = 0.75;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);
    }
  }

  async function startMic(){
    ensureAudioCtx();
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio:{
        echoCancellation:false, noiseSuppression:false, autoGainControl:false
      }});
      sourceNode = audioCtx.createMediaStreamSource(stream);
      sourceNode.connect(analyser);
      document.getElementById('srcBadge').textContent = 'MIC LIVE';
      enterViz();
    }catch(err){
      setStatus('mic permission denied — try "play an audio file" instead');
    }
  }

  function startFile(file){
    ensureAudioCtx();
    if(!audioEl){
      audioEl = new Audio();
      audioEl.loop = true;
      audioEl.crossOrigin = 'anonymous';
    }
    const url = URL.createObjectURL(file);
    audioEl.src = url;
    audioEl.play();
    if(!sourceNode || sourceNode._isFile !== true){
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      sourceNode._isFile = true;
      sourceNode.connect(analyser);
      analyser.connect(audioCtx.destination);
    }
    document.getElementById('srcBadge').textContent = (file.name||'FILE').slice(0,18).toUpperCase();
    enterViz();
  }

  function setStatus(msg){
    document.getElementById('statusLine').textContent = msg;
  }

  // ---------- beat detection ----------
  const bassHistory = [];
  const HIST_LEN = 43; // ~ last second at 60fps-ish sampling of energy
  let lastBeatTime = 0;
  let beatFlash = 0; // 0..1 decays
  let beatIntervals = [];
  let bpmEstimate = 0;

  function detectBeat(bassEnergy, now){
    bassHistory.push(bassEnergy);
    if(bassHistory.length > HIST_LEN) bassHistory.shift();
    const avg = bassHistory.reduce((a,b)=>a+b,0)/bassHistory.length;
    const variance = bassHistory.reduce((a,b)=>a+(b-avg)*(b-avg),0)/bassHistory.length;
    const sensitivity = parseFloat(document.getElementById('sens').value);
    const threshold = avg * (1.0 + 0.35*sensitivity) + variance*0.02;
    const minGap = 220; // ms cooldown to avoid double triggers
    if(bassEnergy > threshold && bassEnergy > 18 && (now - lastBeatTime) > minGap){
      const interval = now - lastBeatTime;
      if(lastBeatTime > 0 && interval < 2000 && interval > 220){
        beatIntervals.push(interval);
        if(beatIntervals.length > 8) beatIntervals.shift();
        const avgInterval = beatIntervals.reduce((a,b)=>a+b,0)/beatIntervals.length;
        bpmEstimate = Math.round(60000/avgInterval);
      }
      lastBeatTime = now;
      beatFlash = 1;
      return true;
    }
    return false;
  }

  // ---------- visual state ----------
  let hueBase = 200;
  let rotation = 0;
  let particles = [];
  const MODES = ['kaleido','plasma','starfield','bars'];
  let modeIndex = 0;
  let autoCycle = false;
  let autoCycleBeats = 0;

  function spawnBurst(cx, cy, count, energy){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const speed = (1+Math.random()*3) * (0.5+energy/60);
      particles.push({
        x:cx, y:cy,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
        life:1, hue: hueBase + Math.random()*60-30,
        size: 1.5+Math.random()*2.5
      });
    }
    if(particles.length > 900) particles.splice(0, particles.length-900);
  }

  function bandEnergy(data, loBin, hiBin){
    let sum=0, n=0;
    for(let i=loBin;i<=hiBin && i<data.length;i++){ sum+=data[i]; n++; }
    return n? sum/n : 0;
  }

  // ---------- render loop ----------
  let lastFrame = performance.now();

  function draw(now){
    requestAnimationFrame(draw);
    const dt = Math.min(64, now-lastFrame); lastFrame = now;

    if(!analyser){ return; }

    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);

    const nBins = freqData.length;
    const bass = bandEnergy(freqData, 0, Math.floor(nBins*0.06));
    const mid  = bandEnergy(freqData, Math.floor(nBins*0.06), Math.floor(nBins*0.28));
    const treble = bandEnergy(freqData, Math.floor(nBins*0.28), Math.floor(nBins*0.75));
    const overall = (bass+mid+treble)/3;

    const isBeat = detectBeat(bass, now);
    if(isBeat){
      spawnBurst(W/2, H/2, 10+Math.floor(bass/8), bass);
      if(autoCycle){
        autoCycleBeats++;
        if(autoCycleBeats % 16 === 0){ nextMode(); }
      }
    }
    beatFlash *= 0.90;

    hueBase += 0.15 + treble*0.004;
    rotation += 0.0009*dt + bass*0.00004*dt;

    document.getElementById('bpmBadge').innerHTML =
      (bpmEstimate>40 && bpmEstimate<220 ? bpmEstimate : '--') + ' <span style="color:var(--hud-fg-dim)">bpm</span>';

    // background fade (trail effect)
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    ctx.fillRect(0,0,W,H);

    const mode = MODES[modeIndex];
    if(mode==='kaleido') drawKaleido(bass, mid, treble, overall);
    else if(mode==='plasma') drawPlasma(bass, mid, treble, overall);
    else if(mode==='starfield') drawStarfield(bass, mid, treble, overall);
    else if(mode==='bars') drawBars(bass, mid, treble, overall);

    drawParticles(dt);

    if(beatFlash > 0.03){
      ctx.fillStyle = `rgba(255,255,255,${beatFlash*0.05})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function drawKaleido(bass,mid,treble,overall){
    const cx=W/2, cy=H/2;
    const segs = 8;
    const maxR = Math.hypot(W,H)/2;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rotation);
    for(let s=0;s<segs;s++){
      ctx.save();
      ctx.rotate((Math.PI*2/segs)*s);
      ctx.beginPath();
      const points = 48;
      for(let i=0;i<=points;i++){
        const t = i/points;
        const binIdx = Math.floor(t*(freqData.length*0.5));
        const amp = freqData[binIdx]/255;
        const r = t*maxR*0.9*(0.35+0.65*amp) + beatFlash*40;
        const ang = t*(Math.PI/segs);
        const x = Math.cos(ang)*r;
        const y = Math.sin(ang)*r;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      const hue = (hueBase + s*(360/segs))%360;
      ctx.strokeStyle = `hsla(${hue},90%,${55+beatFlash*20}%,0.75)`;
      ctx.lineWidth = 1.5 + overall*0.02;
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // center pulse
    const pr = 30 + bass*1.1 + beatFlash*60;
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,pr);
    grad.addColorStop(0, `hsla(${hueBase},95%,70%,0.55)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2); ctx.fill();
  }

  let plasmaT = 0;
  function drawPlasma(bass,mid,treble,overall){
    plasmaT += 0.012 + treble*0.00025;
    const rows = 5;
    for(let r=0;r<rows;r++){
      ctx.beginPath();
      const yBase = H*(0.2+0.6*(r/(rows-1)));
      const ampScale = 30 + mid*0.9 + beatFlash*50;
      for(let x=0;x<=W;x+=8){
        const t = x/W;
        const y = yBase
          + Math.sin(t*Math.PI*4 + plasmaT*2 + r) * ampScale
          + Math.sin(t*Math.PI*9 + plasmaT*3.3 - r) * (ampScale*0.35);
        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      const hue = (hueBase + r*40)%360;
      ctx.strokeStyle = `hsla(${hue},85%,60%,0.5)`;
      ctx.lineWidth = 2 + bass*0.02;
      ctx.stroke();
    }
  }

  let stars = [];
  function ensureStars(){
    if(stars.length) return;
    for(let i=0;i<220;i++){
      stars.push({ a: Math.random()*Math.PI*2, r: Math.random()*Math.hypot(W,H)/2, speed: 0.4+Math.random()*1.2, size: 0.5+Math.random()*1.5 });
    }
  }
  function drawStarfield(bass,mid,treble,overall){
    ensureStars();
    const cx=W/2, cy=H/2;
    const speedMul = 1 + overall*0.05 + beatFlash*4;
    ctx.save();
    for(const st of stars){
      st.r += st.speed*speedMul*2;
      if(st.r > Math.hypot(W,H)/1.3){ st.r = 0; st.a = Math.random()*Math.PI*2; }
      const x = cx + Math.cos(st.a)*st.r;
      const y = cy + Math.sin(st.a)*st.r;
      const sz = st.size * (1+st.r/300);
      const hue = (hueBase + st.r*0.2)%360;
      ctx.fillStyle = `hsla(${hue},80%,${60+beatFlash*20}%,${Math.min(1,0.3+st.r/400)})`;
      ctx.fillRect(x,y,sz,sz);
    }
    ctx.restore();
  }

  function drawBars(bass,mid,treble,overall){
    const n = 64;
    const barW = W/n;
    for(let i=0;i<n;i++){
      const binIdx = Math.floor((i/n) * freqData.length*0.6);
      const amp = freqData[binIdx]/255;
      const h = amp*H*0.6 + beatFlash*20;
      const hue = (hueBase + i*4)%360;
      ctx.fillStyle = `hsla(${hue},85%,55%,0.85)`;
      ctx.fillRect(i*barW+1, H-h, barW-2, h);
      // mirrored top glow
      ctx.fillStyle = `hsla(${hue},85%,55%,0.18)`;
      ctx.fillRect(i*barW+1, 0, barW-2, h*0.3);
    }
    // waveform overlay
    ctx.beginPath();
    for(let i=0;i<timeData.length;i+=4){
      const x = (i/timeData.length)*W;
      const y = H/2 + (timeData[i]-128)/128 * H*0.18;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawParticles(dt){
    ctx.save();
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*(dt/16); p.y += p.vy*(dt/16);
      p.life -= 0.012*(dt/16);
      if(p.life<=0){ particles.splice(i,1); continue; }
      ctx.fillStyle = `hsla(${p.hue},90%,65%,${p.life})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- mode switching ----------
  function nextMode(){
    modeIndex = (modeIndex+1)%MODES.length;
    showModeLabel(MODES[modeIndex]);
  }
  let modeLabelTimeout;
  function showModeLabel(name){
    const el = document.getElementById('modeLabel');
    el.textContent = name;
    el.classList.add('show');
    clearTimeout(modeLabelTimeout);
    modeLabelTimeout = setTimeout(()=>el.classList.remove('show'), 1100);
  }

  // ---------- HUD auto-hide ----------
  let hudTimeout;
  function wakeHud(){
    const hud = document.getElementById('hud');
    hud.classList.remove('dim');
    clearTimeout(hudTimeout);
    hudTimeout = setTimeout(()=>hud.classList.add('dim'), 4000);
  }

  // ---------- wire up UI ----------
  function enterViz(){
    document.getElementById('startScreen').classList.add('hidden');
    wakeHud();
    lastFrame = performance.now();
    requestAnimationFrame(draw);
  }

  document.getElementById('micBtn').addEventListener('click', startMic);
  document.getElementById('fileBtn').addEventListener('click', ()=>{
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', (e)=>{
    if(e.target.files && e.target.files[0]) startFile(e.target.files[0]);
  });

  document.getElementById('modeBtn').addEventListener('click', nextMode);
  document.getElementById('autoBtn').addEventListener('click', (e)=>{
    autoCycle = !autoCycle;
    e.target.classList.toggle('active', autoCycle);
  });
  document.getElementById('fsBtn').addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });

  window.addEventListener('pointerdown', wakeHud);
  window.addEventListener('pointermove', wakeHud);

  showModeLabel(MODES[0]);
})();
</script>
</body>
</html>
